<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen Design Review</title>
<script src="../config.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #F4F6F8; color: #1a1a1a; font-size: 15px; }

  .top-bar { background: #1B3A4B; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  .top-bar .brand { color: #fff; font-weight: 700; font-size: 16px; letter-spacing: 0.5px; }
  .top-bar .version-tag { color: #90b4c8; font-size: 13px; }

  .container { max-width: 860px; margin: 0 auto; padding: 32px 20px 80px; }

  .screen-banner { background: #fff; border: 1px solid #dde3e8; border-radius: 10px; padding: 20px 24px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .screen-banner h1 { font-size: 20px; font-weight: 700; color: #1B3A4B; }
  .screen-banner .meta { font-size: 13px; color: #666; }
  .screen-banner .meta span { margin-left: 16px; }

  .role-selector { background: #fff; border: 1px solid #dde3e8; border-radius: 10px; padding: 20px 24px; margin-bottom: 24px; }
  .role-selector label { font-size: 13px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 10px; }
  .role-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .role-btn { padding: 8px 16px; border: 1.5px solid #dde3e8; border-radius: 6px; background: #fff; font-size: 14px; color: #444; cursor: pointer; transition: all 0.15s; }
  .role-btn:hover { border-color: #1B3A4B; color: #1B3A4B; }
  .role-btn.active { background: #1B3A4B; border-color: #1B3A4B; color: #fff; font-weight: 600; }

  .reviewer-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .field-group { background: #fff; border: 1px solid #dde3e8; border-radius: 10px; padding: 16px 20px; }
  .field-group label { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
  .field-group input { width: 100%; border: none; font-size: 15px; color: #1a1a1a; outline: none; background: transparent; }

  .section-card { background: #fff; border: 1px solid #dde3e8; border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
  .section-header { background: #EEF2F5; padding: 12px 20px; font-size: 13px; font-weight: 700; color: #1B3A4B; text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1px solid #dde3e8; }

  .criterion-row { padding: 14px 20px; border-bottom: 1px solid #f0f2f4; display: flex; align-items: flex-start; gap: 16px; }
  .criterion-row:last-child { border-bottom: none; }
  .criterion-row.rejected { background: #FFF8F8; }

  .criterion-num { font-size: 12px; font-weight: 700; color: #aaa; min-width: 28px; padding-top: 2px; }
  .criterion-text { flex: 1; font-size: 14px; color: #333; line-height: 1.5; }

  .yn-toggle { display: flex; gap: 6px; flex-shrink: 0; }
  .yn-btn { width: 44px; height: 30px; border-radius: 6px; border: 1.5px solid #dde3e8; background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; color: #888; }
  .yn-btn:hover { border-color: #999; }
  .yn-btn.yes.active { background: #E6F4EC; border-color: #2D8653; color: #2D8653; }
  .yn-btn.no.active { background: #FDECEA; border-color: #C0392B; color: #C0392B; }

  .rejection-panel { margin: 4px 0 4px 44px; background: #FFF3F3; border: 1px solid #f5c6c6; border-radius: 8px; padding: 14px 16px; display: none; }
  .rejection-panel.visible { display: block; }
  .rej-field { margin-bottom: 10px; }
  .rej-field:last-child { margin-bottom: 0; }
  .rej-label { font-size: 11px; font-weight: 700; color: #C0392B; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
  .rej-select { width: 100%; padding: 7px 10px; border: 1px solid #f5c6c6; border-radius: 6px; font-size: 13px; color: #333; background: #fff; }
  .rej-other { width: 100%; padding: 7px 10px; border: 1px solid #f5c6c6; border-radius: 6px; font-size: 13px; color: #333; background: #fff; margin-top: 4px; resize: vertical; min-height: 40px; display: none; font-family: inherit; }
  .rej-other.visible { display: block; }

  .na-banner { background: #EEF8F3; border: 1px solid #b2d9c4; border-radius: 8px; padding: 14px 16px; font-size: 14px; color: #1B6B40; margin-bottom: 16px; }
  .na-banner button { margin-top: 10px; padding: 7px 20px; background: #2D8653; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; }

  .notes-section { background: #fff; border: 1px solid #dde3e8; border-radius: 10px; padding: 20px 24px; margin-bottom: 24px; }
  .notes-section label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 8px; }
  .notes-section .optional { font-weight: 400; color: #999; font-size: 12px; margin-left: 6px; }
  .notes-section textarea { width: 100%; border: 1px solid #dde3e8; border-radius: 6px; padding: 10px 12px; font-size: 14px; font-family: inherit; color: #333; resize: vertical; min-height: 72px; }

  .decision-bar { background: #fff; border: 1px solid #dde3e8; border-radius: 10px; padding: 20px 24px; margin-bottom: 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .decision-bar .dec-label { font-size: 14px; font-weight: 600; color: #1B3A4B; }
  .dec-btn { padding: 10px 28px; border-radius: 8px; border: 2px solid #dde3e8; background: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .dec-btn.approve:hover, .dec-btn.approve.active { background: #E6F4EC; border-color: #2D8653; color: #2D8653; }
  .dec-btn.reject:hover, .dec-btn.reject.active { background: #FDECEA; border-color: #C0392B; color: #C0392B; }
  .dec-hint { font-size: 12px; color: #999; margin-left: auto; }

  .submit-row { text-align: center; }
  .submit-btn { background: #1B3A4B; color: #fff; border: none; padding: 14px 48px; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
  .submit-btn:hover { background: #2a5470; }
  .submit-btn:disabled { background: #aaa; cursor: not-allowed; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1B3A4B; color: #fff; padding: 12px 28px; border-radius: 8px; font-size: 14px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
  .toast.error { background: #C0392B; }
  .toast.success { background: #2D8653; }

  .status-screen { display: none; text-align: center; padding: 60px 20px; }
  .status-screen.visible { display: block; }
  .status-icon { font-size: 56px; margin-bottom: 16px; }
  .status-screen h2 { font-size: 24px; font-weight: 700; color: #1B3A4B; margin-bottom: 8px; }
  .status-screen p { font-size: 15px; color: #666; max-width: 440px; margin: 0 auto 24px; line-height: 1.6; }
  .status-screen .ref { font-size: 13px; color: #aaa; background: #f4f6f8; padding: 8px 16px; border-radius: 6px; display: inline-block; }

  @media (max-width: 600px) {
    .reviewer-row { grid-template-columns: 1fr; }
    .dec-hint { display: none; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <span class="brand">Screen Design Review</span>
  <span class="version-tag">Generic — v1.0</span>
</div>

<div class="container" id="mainForm">

  <div class="screen-banner">
    <div>
      <h1 id="screenTitle">Loading…</h1>
      <div class="meta">
        <span id="metaProduct"></span>
        <span id="metaVersion"></span>
        <span id="metaDate"></span>
      </div>
    </div>
  </div>

  <div class="role-selector">
    <label>Select your role</label>
    <div class="role-grid" id="roleGrid">
      <button class="role-btn" data-role="Frontend Developer" onclick="setRole(this)">Front-end developer</button>
      <button class="role-btn" data-role="Backend Developer" onclick="setRole(this)">Back-end developer</button>
      <button class="role-btn" data-role="AI Developer" onclick="setRole(this)">AI developer</button>
      <button class="role-btn" data-role="Data Engineer" onclick="setRole(this)">Data engineer / developer</button>
      <button class="role-btn" data-role="QA Engineer" onclick="setRole(this)">QA engineer</button>
      <button class="role-btn" data-role="Project Manager" onclick="setRole(this)">Project manager</button>
    </div>
  </div>

  <div class="reviewer-row">
    <div class="field-group">
      <label>Your name</label>
      <input type="text" id="reviewerName" placeholder="Full name" />
    </div>
    <div class="field-group">
      <label>Review date</label>
      <input type="text" id="reviewDate" />
    </div>
  </div>

  <div id="criteriaContainer"></div>

  <div class="notes-section">
    <label>Any other observations <span class="optional">optional</span></label>
    <textarea id="generalNotes" placeholder="Anything else worth flagging that isn't covered above…"></textarea>
  </div>

  <div class="decision-bar">
    <span class="dec-label">Your decision on this screen:</span>
    <button class="dec-btn approve" id="btnApprove" onclick="setDecision('approve')">✓ Soft Approve</button>
    <button class="dec-btn reject" id="btnReject" onclick="setDecision('reject')">✗ Reject</button>
    <span class="dec-hint">Reject if any criterion is No</span>
  </div>

  <div class="submit-row">
    <button class="submit-btn" onclick="submitReview()">Submit review</button>
  </div>

</div>

<div class="container status-screen" id="statusScreen">
  <div class="status-icon" id="statusIcon">✅</div>
  <h2 id="statusTitle">Review submitted</h2>
  <p id="statusMsg"></p>
  <div class="ref" id="statusRef"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const CRITERIA = {
  "Frontend Developer": {
    na: false,
    sections: [
      {
        title: "Component & state coverage",
        items: [
          "Every UI component on this screen is identifiable — no vague placeholders or TBD elements remain",
          "Loading state is designed for every element that fetches or waits on data",
          "Empty state is designed for every list, table, chart, or data panel that can return no results",
          "Error state is designed for every element that can fail to load",
          "Disabled and conditional states are shown for all buttons and controls that have conditional availability"
        ]
      },
      {
        title: "Data display & interactions",
        items: [
          "Every field that displays data is labelled — no unlabelled values, numbers, or indicators on screen",
          "Every filter or toggle has a defined default state and a defined effect on what changes on screen",
          "Every form input has its validation rule specified — no validation logic left for the developer to infer",
          "Overflow and scroll behaviour is defined for all tables, lists, and charts at minimum supported viewport width",
          "Every action that navigates away from this screen has a confirmed destination"
        ]
      }
    ],
    issues: [
      "Component not specified or placeholder remains",
      "Loading state missing for a data-dependent element",
      "Empty state not designed",
      "Error state not designed",
      "Disabled or conditional state not shown",
      "Field displayed without a label",
      "Filter or toggle behaviour not specified",
      "Validation rule not specified for an input",
      "Overflow or scroll behaviour undefined",
      "Navigation destination not confirmed",
      "Other"
    ]
  },

  "Backend Developer": {
    na: false,
    sections: [
      {
        title: "Data sources & contracts",
        items: [
          "Every field displayed on screen maps to a confirmed data source — stored field, computed value, or external feed",
          "Every data panel or chart maps to an identified API endpoint — no panel lacks a data contract",
          "Fields that can be NULL or unavailable are handled — the API returns NULL and the UI has a defined state for it, not a coerced zero or blank",
          "Server-side filtering is confirmed for all filter controls — full datasets are not returned to the client for client-side filtering"
        ]
      },
      {
        title: "Business rules & access",
        items: [
          "Every conditional display rule visible in the design has a corresponding server-side enforcement — not just a frontend hide/show",
          "Role-based access is confirmed — different user roles receive appropriate data payloads or endpoints",
          "Every write operation triggered from this screen is identified — what is written, to which table or field, under what conditions",
          "All business rules embedded in the UI (thresholds, eligibility conditions, state-based visibility) are documented and confirmed implementable"
        ]
      },
      {
        title: "Performance",
        items: [
          "Expected data volume for this screen is assessed — any query touching large datasets has a defined strategy (pagination, batch, or cache)",
          "Real-time vs batch boundary is defined for all computed or aggregated values shown on screen"
        ]
      }
    ],
    issues: [
      "Field source not confirmed",
      "No API endpoint identified for this panel",
      "NULL state not handled — coerced to zero or blank",
      "Filtering done client-side instead of server-side",
      "Conditional display rule lacks server-side enforcement",
      "Role-based access not defined",
      "Write operation not identified or scoped",
      "Business rule not documented or unconfirmed",
      "Data volume not assessed",
      "Real-time vs batch boundary undefined",
      "Other"
    ]
  },

  "AI Developer": {
    na: true,
    naLabel: "This screen has no AI-generated outputs, AI calls, or AI-assisted features. Mark as N/A and Soft Approve.",
    sections: [
      {
        title: "AI output display",
        items: [
          "Every AI-generated value displayed on screen is identified — text, scores, labels, recommendations, or generated content",
          "Confidence or quality signals from the AI model are handled — the design specifies what is shown when confidence is low or the model is uncertain",
          "AI-generated content is clearly distinguished from system-generated or user-generated content where relevant"
        ]
      },
      {
        title: "Triggers, latency & fallbacks",
        items: [
          "Every user action that triggers an AI call is identified — which action, which model, expected latency range",
          "Loading state is designed for every element that awaits an AI response",
          "Timeout and error fallback states are designed — no element hangs or goes blank if the AI call fails",
          "Any anti-gaming or misuse prevention behaviour of AI-assisted features is specified"
        ]
      },
      {
        title: "Model & version consistency",
        items: [
          "The model version or prompt version used to generate outputs on this screen is confirmed — mixed-version outputs are not displayed together without differentiation",
          "Any AI output that feeds into a downstream score, decision, or stored record is identified and its data flow is confirmed"
        ]
      }
    ],
    issues: [
      "AI-generated value not identified on screen",
      "Low-confidence or uncertain model output not handled",
      "AI content not distinguished from system or user content",
      "AI call trigger not specified",
      "Loading state missing for AI response",
      "Timeout or error fallback state missing",
      "Anti-gaming behaviour not specified",
      "Model or prompt version not confirmed",
      "Downstream data flow of AI output not confirmed",
      "Other"
    ]
  },

  "Data Engineer": {
    na: false,
    sections: [
      {
        title: "Metric-to-display alignment",
        items: [
          "Every metric or computed value shown on screen is confirmed as an output of the defined data pipeline — nothing is inferred or assumed outside the pipeline",
          "All label strings displayed on screen match the exact output of the computation layer — no paraphrasing, rounding, or reinterpretation of label text",
          "Every threshold, band, or category boundary used to derive a displayed label is confirmed against the specification — no alternate definitions used in the UI"
        ]
      },
      {
        title: "Data availability & gating",
        items: [
          "Metrics that require a minimum dataset size or a completion event before they are valid are not displayed until that condition is met — a defined unavailable state exists",
          "Metrics with different availability windows are clearly distinguished in the design — they do not share the same display state",
          "Any metric that is display-only and never written to the database or fed into a score is confirmed as such — its data flow terminates at the display layer"
        ]
      },
      {
        title: "Metric semantics",
        items: [
          "Directional metrics (above or below a threshold, positive or negative gap) are sourced from the correct computation — direction is not inferred from magnitude alone",
          "NULL and zero are treated as distinct states throughout — no metric collapses NULL to zero in display",
          "The denominator for any percentage or ratio shown on screen is confirmed — fixed denominators are not replaced with variable counts",
          "No internal computation variable intended only for pipeline use appears as a displayed metric on this screen"
        ]
      }
    ],
    issues: [
      "Metric not confirmed as a pipeline output",
      "Label string does not match computation layer output exactly",
      "Wrong threshold or category boundary used",
      "Metric shown before its availability condition is met",
      "Metrics with different availability windows conflated",
      "Display-only metric incorrectly written to database or fed into scoring",
      "Directional metric computed from magnitude instead of correct source",
      "NULL collapsed to zero in display",
      "Denominator incorrect or inconsistent",
      "Internal pipeline variable exposed as a display metric",
      "Other"
    ]
  },

  "QA Engineer": {
    na: false,
    sections: [
      {
        title: "Testability",
        items: [
          "Every interactive element has a testable acceptance criterion — the expected outcome of each action is unambiguously defined",
          "Pass and fail states for each interaction are distinguishable from the design alone — no interpretation needed to write a test",
          "Every conditional display rule is fully specified — every if-X-then-show-Y case is documented as a discrete testable condition"
        ]
      },
      {
        title: "Edge cases",
        items: [
          "Zero-result state is handled — the screen is defined for the case where a data source returns nothing",
          "Minimum and maximum data volume states are handled — the screen is defined for both a single record and an unexpectedly large dataset",
          "NULL vs zero is explicitly handled — both states render correctly and differently where relevant",
          "Empty filter or search result state has a defined UI — the screen does not crash, freeze, or show stale data"
        ]
      },
      {
        title: "Access & integrity",
        items: [
          "Role-based access is verifiable — what each user role sees on this screen is explicitly defined and testable",
          "No action on this screen writes data that would retroactively affect records outside this screen's scope — side effects are identified and bounded",
          "Every state transition on this screen is testable — entry and exit conditions for each state are defined"
        ]
      }
    ],
    issues: [
      "Acceptance criterion missing or ambiguous for an element",
      "Pass or fail state not distinguishable from the design",
      "Conditional display rule not fully specified",
      "Zero-result state not handled",
      "Min or max data volume state not handled",
      "NULL and zero not distinguished",
      "Empty filter or search result state undefined",
      "Role-based access not verifiable",
      "Write side effects not identified or bounded",
      "State transition entry or exit condition undefined",
      "Other"
    ]
  },

  "Project Manager": {
    na: false,
    sections: [
      {
        title: "Scope & decisions",
        items: [
          "Every element on this screen is within agreed scope for this release — no unconfirmed additions are present",
          "All design decisions on this screen are made and documented — no TBD, placeholder, or to-be-confirmed text remains",
          "All assumptions the designer made are explicitly stated — nothing is left for the team to infer independently"
        ]
      },
      {
        title: "Dependencies & handoffs",
        items: [
          "The entry point to this screen is defined — what user action or system event triggers navigation here",
          "All exit points from this screen are confirmed — every action that leaves this screen has a destination",
          "Cross-screen dependencies (shared components, shared data, shared state) are consistent with the designs of connected screens",
          "All external dependencies (third-party services, integrations, background jobs) that affect what this screen displays are identified and assigned to an owner"
        ]
      },
      {
        title: "Timeline & delivery",
        items: [
          "No hidden complexity was discovered during this review that would affect the agreed delivery timeline for this screen",
          "No element on this screen depends on a feature, integration, or dataset that is explicitly out of scope for this release"
        ]
      }
    ],
    issues: [
      "Element is out of scope for this release",
      "Design decision unresolved — TBD or placeholder remains",
      "Designer assumption not explicitly stated",
      "Entry point to screen not defined",
      "Exit point or navigation destination missing",
      "Inconsistency with a connected screen",
      "External dependency not identified or unassigned",
      "Hidden complexity threatening delivery timeline",
      "Dependency on an out-of-scope feature or integration",
      "Other"
    ]
  }
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentRole = null;
let decision = null;
let isNA = false;
let screenName = "Screen not specified";
let screenVersion = "v1";
let productName = "";

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.onload = function() {
  const p = new URLSearchParams(window.location.search);
  screenName  = p.get("screen")  || "Screen not specified";
  screenVersion = p.get("version") || "v1";
  productName = p.get("product") || "";

  document.getElementById("screenTitle").textContent = screenName;
  if (productName) document.getElementById("metaProduct").textContent = "Product: " + productName;
  document.getElementById("metaVersion").textContent = "Version: " + screenVersion;
  document.getElementById("metaDate").textContent = new Date().toLocaleDateString("en-GB", { day:"2-digit", month:"short", year:"numeric" });
  document.getElementById("reviewDate").value = new Date().toLocaleDateString("en-GB");

  const roleParam = p.get("role");
  if (roleParam) {
    const btn = [...document.querySelectorAll(".role-btn")].find(b => b.dataset.role === roleParam);
    if (btn) setRole(btn);
  }
};

// ─── ROLE ─────────────────────────────────────────────────────────────────────
function setRole(btn) {
  document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentRole = btn.dataset.role;
  decision = null; isNA = false;
  document.getElementById("btnApprove").classList.remove("active");
  document.getElementById("btnReject").classList.remove("active");
  renderCriteria();
}

function renderCriteria() {
  const container = document.getElementById("criteriaContainer");
  container.innerHTML = "";
  if (!currentRole || !CRITERIA[currentRole]) return;
  const cfg = CRITERIA[currentRole];

  if (cfg.na) {
    const nb = document.createElement("div");
    nb.className = "na-banner";
    nb.innerHTML = `<strong>Not applicable:</strong> ${cfg.naLabel}<br>
      <button onclick="markNA()">Mark as N/A and Soft Approve</button>`;
    container.appendChild(nb);
  }

  let n = 1;
  cfg.sections.forEach(section => {
    const card = document.createElement("div");
    card.className = "section-card";

    const header = document.createElement("div");
    header.className = "section-header";
    header.textContent = section.title;
    card.appendChild(header);

    section.items.forEach((item, i) => {
      const row = document.createElement("div");
      row.className = "criterion-row";
      row.id = "row-" + n;
      row.innerHTML = `
        <div class="criterion-num">${n}</div>
        <div class="criterion-text">${item}</div>
        <div class="yn-toggle">
          <button class="yn-btn yes" onclick="setCriterion(${n},'yes',this)">Yes</button>
          <button class="yn-btn no"  onclick="setCriterion(${n},'no',this)">No</button>
        </div>`;
      card.appendChild(row);

      const rp = document.createElement("div");
      rp.className = "rejection-panel";
      rp.id = "rej-" + n;
      rp.innerHTML = buildRejPanel(n, cfg.issues);
      card.appendChild(rp);
      n++;
    });
    container.appendChild(card);
  });
}

function buildRejPanel(n, issues) {
  const opts = issues.map(i => `<option value="${i}">${i}</option>`).join("");
  return `
    <div class="rej-field">
      <div class="rej-label">Issue</div>
      <select class="rej-select" id="issue-${n}" onchange="checkOther('issue-${n}','oissue-${n}')">
        <option value="">Select the issue type…</option>${opts}
      </select>
      <textarea class="rej-other" id="oissue-${n}" placeholder="Describe the issue…"></textarea>
    </div>
    <div class="rej-field">
      <div class="rej-label">Impact</div>
      <select class="rej-select" id="impact-${n}">
        <option value="">Select the impact…</option>
        <option>Blocks build — cannot proceed without resolution</option>
        <option>Risk of incorrect behaviour at runtime</option>
        <option>Risk of wrong data or label shown to user</option>
        <option>Ambiguity — team will make conflicting assumptions</option>
        <option>Edge case not handled — will fail for specific inputs</option>
        <option>Performance risk — may cause slow or failed loads</option>
        <option>Scope creep — adds unplanned work</option>
        <option>Needs discussion in next team sync</option>
      </select>
    </div>
    <div class="rej-field">
      <div class="rej-label">Suggested fix</div>
      <select class="rej-select" id="fix-${n}" onchange="checkOther('fix-${n}','ofix-${n}')">
        <option value="">Select a resolution path…</option>
        <option>Needs discussion in next team sync — no clear fix yet</option>
        <option>Designer to update design before development starts</option>
        <option>Add missing state or edge case to design</option>
        <option>Confirm data source or endpoint in next backend sync</option>
        <option>Clarify with PM — may be out of scope</option>
        <option>Other</option>
      </select>
      <textarea class="rej-other" id="ofix-${n}" placeholder="Describe the fix…"></textarea>
    </div>`;
}

function checkOther(selId, othId) {
  const v = document.getElementById(selId).value;
  document.getElementById(othId).classList.toggle("visible", v === "Other");
}

function setCriterion(n, val, btn) {
  const row = document.getElementById("row-" + n);
  const panel = document.getElementById("rej-" + n);
  row.querySelectorAll(".yn-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  if (val === "no") {
    row.classList.add("rejected");
    panel.classList.add("visible");
    setDecision("reject");
  } else {
    row.classList.remove("rejected");
    panel.classList.remove("visible");
  }
}

function setDecision(val) {
  decision = val;
  document.getElementById("btnApprove").classList.toggle("active", val === "approve");
  document.getElementById("btnReject").classList.toggle("active", val === "reject");
}

function markNA() {
  isNA = true;
  setDecision("approve");
  showToast("Marked as N/A — Soft Approved", "success");
}

// ─── SUBMIT ───────────────────────────────────────────────────────────────────
async function submitReview() {
  const name = document.getElementById("reviewerName").value.trim();
  if (!name)        { showToast("Please enter your name", "error"); return; }
  if (!currentRole) { showToast("Please select your role", "error"); return; }
  if (!decision)    { showToast("Please set your decision", "error"); return; }

  const payload = buildPayload(name);
  const btn = document.querySelector(".submit-btn");
  btn.disabled = true; btn.textContent = "Saving…";

  try {
    const results = await Promise.allSettled([saveToGitHub(payload), saveToDrive(payload)]);
    const failed = results.filter(r => r.status === "rejected").map(r => r.reason?.message);
    if (failed.length === 2) throw new Error(failed[0]);
    const warning = failed.length === 1
      ? "Saved to " + (results[0].status === "fulfilled" ? "GitHub" : "Drive") + " only. " + failed[0]
      : null;
    showSuccess(payload.ref, warning);
  } catch(e) {
    btn.disabled = false; btn.textContent = "Submit review";
    showToast("Save failed: " + e.message, "error");
  }
}

function buildPayload(name) {
  const cfg = CRITERIA[currentRole];
  const criteria = [];
  if (!isNA && cfg) {
    let n = 1;
    cfg.sections.forEach(section => {
      section.items.forEach(item => {
        const yes = document.querySelector(`#row-${n} .yn-btn.yes`);
        const no  = document.querySelector(`#row-${n} .yn-btn.no`);
        const response = yes?.classList.contains("active") ? "yes" : no?.classList.contains("active") ? "no" : "unanswered";
        const entry = { num: n, section: section.title, criterion: item, response };
        if (response === "no") {
          const issueEl  = document.getElementById("issue-" + n);
          const impactEl = document.getElementById("impact-" + n);
          const fixEl    = document.getElementById("fix-" + n);
          entry.rejection = {
            issue:         issueEl?.value  === "Other" ? document.getElementById("oissue-"+n)?.value : issueEl?.value,
            impact:        impactEl?.value,
            suggested_fix: fixEl?.value    === "Other" ? document.getElementById("ofix-"+n)?.value   : fixEl?.value,
          };
        }
        criteria.push(entry); n++;
      });
    });
  }
  const safeScreen  = screenName.replace(/[^a-zA-Z0-9]/g,"_");
  const safeRole    = currentRole.replace(/[^a-zA-Z0-9]/g,"_");
  const ref = `${safeScreen}_${screenVersion}_${safeRole}_${Date.now()}`;
  return {
    ref, screen: screenName, version: screenVersion,
    product: productName, role: currentRole,
    reviewer: name, submitted_at: new Date().toISOString(),
    decision, is_na: isNA,
    general_notes: document.getElementById("generalNotes").value.trim(),
    criteria
  };
}

async function saveToGitHub(payload) {
  const cfg = window.DR_CONFIG;
  const safeScreen = payload.screen.replace(/[^a-zA-Z0-9]/g,"_");
  const safeRole   = payload.role.replace(/[^a-zA-Z0-9]/g,"_");
  const path = `responses/generic/${safeScreen}/${payload.version}/${safeRole}_${Date.now()}.json`;
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
  const res = await fetch(`https://api.github.com/repos/${cfg.repo}/contents/${path}`, {
    method: "PUT",
    headers: { "Authorization": "token " + cfg.token, "Content-Type": "application/json" },
    body: JSON.stringify({ message: `Review: ${payload.screen} ${payload.version} — ${payload.role}`, content })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.message || "GitHub error"); }
}

async function saveToDrive(payload) {
  const url = window.DR_CONFIG.appsScriptUrl;
  if (!url || url === "PASTE_YOUR_APPS_SCRIPT_URL_HERE") throw new Error("Apps Script URL not configured");
  const res = await fetch(url, {
    method: "POST",
    body: JSON.stringify({ ...payload, product_line: "generic" }),
    headers: { "Content-Type": "text/plain" }
  });
  if (!res.ok) throw new Error("Drive save failed: HTTP " + res.status);
  const data = await res.json();
  if (data.status !== "ok") throw new Error("Drive error: " + (data.message || "unknown"));
}

function showSuccess(ref, warning) {
  document.getElementById("mainForm").style.display = "none";
  const s = document.getElementById("statusScreen");
  s.classList.add("visible");
  document.getElementById("statusIcon").textContent  = decision === "approve" ? "✅" : "🔴";
  document.getElementById("statusTitle").textContent = decision === "approve" ? "Review submitted — Soft Approved" : "Review submitted — Rejected";
  const base = decision === "approve"
    ? "Your approval has been recorded. Saved to GitHub and Google Drive."
    : "Your rejection notes have been saved to GitHub and Google Drive.";
  document.getElementById("statusMsg").textContent = warning ? warning + " " + base : base;
  document.getElementById("statusRef").textContent = "Ref: " + ref;
}

function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast show " + (type||"");
  setTimeout(() => t.className = "toast", 3000);
}
</script>
