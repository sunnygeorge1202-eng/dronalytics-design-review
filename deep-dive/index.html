<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dronalytics — Admin Deep Dive Analytics</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#F2F4F7;color:#1a1a1a;font-size:13px}
.topbar{background:#1B3A4B;padding:13px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar .brand{color:#fff;font-weight:700;font-size:15px;letter-spacing:.3px}
.topbar .sub{color:#90b4c8;font-size:12px}
.wrap{max-width:1080px;margin:0 auto;padding:20px 16px 60px}

/* FILTERS */
.filter-bar{background:#fff;border:1px solid #dde3e8;border-radius:10px;padding:13px 18px;margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filter-bar label{font-size:11px;color:#888;font-weight:500}
.filter-bar select{font-size:12px;padding:5px 9px;border:1px solid #dde3e8;border-radius:6px;background:#fff;color:#1a1a1a}
.lcount{margin-left:auto;font-size:12px;color:#888;display:flex;align-items:center;gap:5px}
.lcount strong{color:#1B3A4B}

/* TABS */
.tab-bar{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid #dde3e8}
.tab-btn{padding:10px 18px;border:none;background:transparent;font-size:13px;color:#888;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab-btn.on{color:#1B3A4B;font-weight:600;border-bottom-color:#1B3A4B}

/* CARDS */
.card{background:#fff;border:1px solid #dde3e8;border-radius:12px;padding:18px 20px;margin-bottom:14px}
.card-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#aaa;margin-bottom:3px}
.card-title{font-size:13px;font-weight:600;color:#1B3A4B;margin-bottom:3px}
.card-sub{font-size:11px;color:#aaa;margin-bottom:14px;line-height:1.5}
.card-filters{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.card-filters label{font-size:11px;color:#888}
.card-filters select{font-size:11px;padding:4px 7px;border:1px solid #dde3e8;border-radius:5px;background:#fff}
.tgl{display:flex;border:1px solid #ccc;border-radius:6px;overflow:hidden}
.tgl button{padding:4px 12px;font-size:11px;background:#fff;border:none;cursor:pointer;color:#666}
.tgl button.on{background:#1B3A4B;color:#fff;font-weight:600}

/* HEATMAP */
.hm-outer{overflow-x:auto;-webkit-overflow-scrolling:touch}
.hmt{border-collapse:separate;border-spacing:2px;table-layout:fixed}
.hmt .rlbl{font-size:11px;color:#555;text-align:right;padding-right:8px;white-space:nowrap;vertical-align:middle;font-weight:500;width:108px;min-width:108px}
.hmt .clbl{font-size:9px;color:#aaa;text-align:center;padding-bottom:4px;white-space:nowrap}
.hmc{height:38px;width:52px;min-width:52px;border-radius:5px;cursor:pointer;vertical-align:middle;text-align:center;transition:transform .1s}
.hmc:hover{transform:scale(1.08);position:relative;z-index:3}
.hmc.sel{outline:2.5px solid #1B3A4B;outline-offset:1px;position:relative;z-index:4}
.hmc-i{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:1px}
.hmc-p{font-size:10px;font-weight:600;line-height:1}
.hmc-l{font-size:8px;line-height:1;opacity:.85}
.hmc-na{background:#f0f2f4!important;border:1px solid #e0e3e7}

/* DRILL PANEL */
.drill{background:#EEF4F8;border:1px solid #c5d8e4;border-radius:12px;padding:16px 18px;margin-bottom:14px}
.drill-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#5a8aa0;margin-bottom:3px}
.drill-title{font-size:13px;font-weight:600;color:#1B3A4B;margin-bottom:10px}
.drill-ctx{font-size:11px;color:#6a8fa0;margin-bottom:12px}
.drill-empty{font-size:12px;color:#aaa;font-style:italic}
.dist-bar{display:flex;height:30px;border-radius:6px;overflow:hidden;margin-bottom:6px}
.dist-seg{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px}
.dist-seg .ds-p{font-size:10px;font-weight:600;line-height:1}
.dist-seg .ds-n{font-size:9px;line-height:1;opacity:.8}
.delta-grid{display:grid;gap:7px;margin-top:10px}
.dcard{border-radius:7px;padding:9px 11px}
.dcard .dc-ct{font-size:20px;font-weight:600;line-height:1}
.dcard .dc-nm{font-size:10px;margin-top:2px}
.dcard .dc-bw{height:4px;border-radius:2px;margin-top:6px;background:rgba(0,0,0,.08)}
.dcard .dc-bf{height:100%;border-radius:2px}
.dcard .dc-d{font-size:10px;margin-top:5px;font-weight:500}
.thin-warn{background:#FAEEDA;color:#633806;border-radius:6px;padding:6px 10px;font-size:11px;margin-bottom:8px}
.up{color:#0F6E56}.dn{color:#993C1D}.nc{color:#aaa}

/* WAFFLE */
.waffle-wrap{display:flex;flex-wrap:wrap;gap:12px}
.waffle-block{flex:1;min-width:160px}
.waffle-label{font-size:11px;font-weight:500;color:#555;margin-bottom:5px}
.waffle-grid{display:grid;grid-template-columns:repeat(10,10px);gap:2px}
.waffle-sq{width:10px;height:10px;border-radius:2px}

/* DOT PLOT */
.dot-plot{position:relative;height:180px}
.dot-plot svg{width:100%;height:100%}

/* BULLET */
.bullet-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bullet-lbl{font-size:11px;color:#555;font-weight:500;min-width:108px}
.bullet-track{flex:1;background:#f0f2f4;border-radius:4px;height:20px;position:relative;overflow:hidden}
.bullet-fill{height:100%;border-radius:4px}
.bullet-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap}
.bullet-counts{font-size:10px;color:#aaa;min-width:60px;text-align:right}

/* STAT CARD */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-card{border-radius:8px;padding:10px 12px;border:1px solid #eee}
.stat-card .sc-centre{font-size:11px;font-weight:600;color:#1B3A4B;margin-bottom:6px}
.stat-card .sc-comp{font-size:10px;color:#888;margin-bottom:5px}
.sc-bar{display:flex;height:14px;border-radius:3px;overflow:hidden;margin-bottom:3px}
.sc-seg{display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:500}

/* RANKED LIST */
.ranked-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f2f4}
.ranked-row:last-child{border-bottom:none}
.ranked-lbl{font-size:12px;color:#555;font-weight:500;min-width:120px}
.ranked-pill{font-size:11px;font-weight:600;padding:3px 12px;border-radius:99px}
.ranked-count{font-size:11px;color:#aaa}

/* STACKED CROSS-CENTRE */
.cc-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.cc-lbl{font-size:11px;color:#555;font-weight:500;min-width:108px;white-space:nowrap}
.cc-bar{flex:1;display:flex;height:20px;border-radius:4px;overflow:hidden}
.cc-seg{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500}
.cc-n{font-size:10px;color:#aaa;min-width:40px;text-align:right}

/* LEGEND */
.leg-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#777}
.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.note{font-size:10px;color:#bbb;font-style:italic;margin-top:8px}
.divider{border:none;border-top:1px solid #eee;margin:14px 0}
.section-hdr{font-size:11px;font-weight:600;color:#1B3A4B;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">Dronalytics</span>
  <span class="sub">Admin · Deep Dive Analytics · 15 Assessments</span>
</div>
<div class="wrap">

<div class="filter-bar">
  <label>Centre</label>
  <select id="fCentre" onchange="renderAll()">
    <option value="all">All centres</option>
    <option>GIZ Trivandrum</option><option>ILS Kochi</option>
    <option>ACL Calicut</option><option>YMCA Thrissur</option>
    <option>KASE Kozhikode</option><option>IHRM Palakkad</option>
  </select>
  <label style="margin-left:8px">CEFR</label>
  <select id="fCEFR" onchange="renderAll()">
    <option value="all">All levels</option>
    <option>A2</option><option>B1</option><option>B2</option>
  </select>
  <div class="lcount">👥 <strong>142</strong> learners in view</div>
</div>

<div class="tab-bar">
  <button class="tab-btn on" onclick="setTab(0)">Mastery &amp; Decisions</button>
  <button class="tab-btn" onclick="setTab(1)">Self-Awareness</button>
  <button class="tab-btn" onclick="setTab(2)">Autonomy &amp; Tool Use</button>
</div>

<div id="tab0"></div>
<div id="tab1" style="display:none"></div>
<div id="tab2" style="display:none"></div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const CENTRES=["GIZ Trivandrum","ILS Kochi","ACL Calicut","YMCA Thrissur","KASE Kozhikode","IHRM Palakkad"];
const CENTRE_N=[58,42,61,38,35,28];
const BLOOMS=["Remember","Understand","Apply","Analyse","Evaluate","Create"];
const SKILLS=["Writing","Reading","Listening","Speaking"];
const N_ASM=15;
const ASMS=Array.from({length:N_ASM},(_,i)=>`A${i+1}`);
const CLRS_C=["#2a78d6","#1baf7a","#eda100","#4a3aa7","#e34948","#e87ba4"];

// ── COLOUR MAP ─────────────────────────────────────────────────────────────────
const COL={
  fragile:["#712B13","#FAECE7"],emerging:["#D85A30","#FAECE7"],
  developing:["#EF9F27","#412402"],competent:["#5DCAA5","#04342C"],
  strong:["#1D9E75","#E1F5EE"],reliable:["#085041","#9FE1CB"],
  z1:["#085041","#9FE1CB"],z2:["#1D9E75","#E1F5EE"],
  z3:["#EF9F27","#412402"],z4:["#D85A30","#FAECE7"],
  low:["#D85A30","#FAECE7"],improving:["#EF9F27","#412402"],aligned:["#1D9E75","#E1F5EE"],
  calibrated:["#1D9E75","#E1F5EE"],mild:["#EF9F27","#412402"],large:["#D85A30","#FAECE7"],
  under:["#2a78d6","#fff"],
  early:["#1D9E75","#E1F5EE"],mid:["#EF9F27","#412402"],late:["#D85A30","#FAECE7"],
  struggling:["#D85A30","#FAECE7"],ums_imp:["#EF9F27","#412402"],ums_str:["#1D9E75","#E1F5EE"],
  inconsistent:["#D85A30","#FAECE7"],mod_stable:["#EF9F27","#412402"],stable:["#1D9E75","#E1F5EE"],
  independent:["#085041","#9FE1CB"],passive:["#B5D4F4","#0C447C"],
  moderate_u:["#EF9F27","#412402"],strategic:["#1D9E75","#E1F5EE"],
  dep_short:["#D85A30","#FAECE7"],overreliant:["#712B13","#FAECE7"],
  fire:["#D85A30","#FAECE7"],watch:["#EF9F27","#412402"],none_f:["#E8EFF3","#555"],
  bpi_dev:["#D85A30","#FAECE7"],bpi_eme:["#EF9F27","#412402"],
  bpi_pro:["#1D9E75","#E1F5EE"],bpi_str:["#085041","#9FE1CB"],
};

// ── SEEDED RANDOM ──────────────────────────────────────────────────────────────
function sr(seed){let s=Math.abs(seed)|1;return()=>{s=(s*9301+49297)%233280;return s/233280}}
function rn(seed,min,max){const r=sr(seed);return min+(r()*(max-min))}

// ── DATA GENERATORS ────────────────────────────────────────────────────────────
function getBPI(ci,si,bi,ai){
  const seed=ci*10000+si*1000+bi*100+ai;
  const r=sr(seed);
  const thin=r()<(bi>=4?0.35:0.08);
  const n=thin?Math.floor(r()*3)+1:Math.round(CENTRE_N[ci]*0.75+r()*CENTRE_N[ci]*0.2);
  const bias=sr(ci*77+si*31+bi*13+ai*3)();
  const prog=ai*0.018;
  let d,e,p,st;
  if(bias<.25){d=Math.round((.38-prog)*n);e=Math.round(.35*n);p=Math.round(.18*n);st=n-d-e-p}
  else if(bias<.55){d=Math.round((.15-prog*.5)*n);e=Math.round(.42*n);p=Math.round((.28+prog*.3)*n);st=n-d-e-p}
  else if(bias<.8){d=Math.round((.08-prog*.3)*n);e=Math.round(.28*n);p=Math.round((.40+prog*.4)*n);st=n-d-e-p}
  else{d=0;e=Math.round((.15-prog*.4)*n);p=Math.round(.38*n);st=n-d-e-p}
  st=Math.max(0,st);d=Math.max(0,d);
  const tot=d+e+p+st;st+=n-tot;
  return{vals:[d,e,p,Math.max(0,st)],n,thin};
}

function getDCI(ci,ai){
  const prog=ai/14;const r=sr(ci*100+ai*7);
  const base=[0.10-prog*0.06, 0.22-prog*0.08, 0.28, 0.24+prog*0.05, 0.12+prog*0.06, 0.04+prog*0.03];
  const noisy=base.map(v=>Math.max(0.01,v+r()*0.05-0.025));
  const sum=noisy.reduce((a,b)=>a+b,0);
  const n=CENTRE_N[ci];
  return noisy.map(v=>Math.max(1,Math.round(v/sum*n)));
}

function getZone(ci,ai){
  const prog=ai/14;const r=sr(ci*200+ai*11);
  const base=[0.15+prog*0.10, 0.25+prog*0.05, 0.32-prog*0.08, 0.28-prog*0.07];
  const noisy=base.map(v=>Math.max(0.01,v+r()*0.04-0.02));
  const sum=noisy.reduce((a,b)=>a+b,0);
  const n=CENTRE_N[ci];
  return noisy.map(v=>Math.max(1,Math.round(v/sum*n)));
}

function getDQS(ci,ai){
  const prog=ai/14;const r=sr(ci*300+ai*13);
  const base=[0.32-prog*0.15, 0.45, 0.23+prog*0.15];
  const noisy=base.map(v=>Math.max(0.02,v+r()*0.04-0.02));
  const sum=noisy.reduce((a,b)=>a+b,0);
  const n=CENTRE_N[ci];
  return noisy.map(v=>Math.max(1,Math.round(v/sum*n)));
}

function getCCG(ci,ai){
  const prog=ai/14;const r=sr(ci*400+ai*17);
  const under=Math.max(1,Math.round((0.18-prog*0.08+r()*0.04)*CENTRE_N[ci]));
  const cal=Math.max(1,Math.round((0.40+prog*0.12+r()*0.04)*CENTRE_N[ci]));
  const over=Math.max(1,CENTRE_N[ci]-under-cal);
  return[under,cal,over];
}

function getPI(ci,ai){
  const prog=ai/14;const r=sr(ci*500+ai*19);
  const late=Math.max(1,Math.round((0.30-prog*0.12+r()*0.04)*CENTRE_N[ci]));
  const early=Math.max(1,Math.round((0.18+prog*0.10+r()*0.04)*CENTRE_N[ci]));
  const mid=Math.max(1,CENTRE_N[ci]-late-early);
  return[early,mid,late];
}

function getUMS(ci,ai){
  const r=sr(ci*600+ai*23);
  const comp=Math.max(3,Math.round((0.32+r()*0.12)*CENTRE_N[ci]));
  const strug=Math.max(1,Math.round(0.28*comp));
  const imp=Math.max(1,Math.round(0.45*comp));
  const str=Math.max(0,comp-strug-imp);
  return{comp,vals:[strug,imp,str],na:CENTRE_N[ci]-comp};
}

function getCITime(ci,ai){
  if(ai<2) return null;
  const prog=(ai-2)/12;const r=sr(ci*700+ai*29);
  const inc=Math.max(1,Math.round((0.26-prog*0.12+r()*0.04)*CENTRE_N[ci]));
  const mod=Math.max(1,Math.round((0.40+r()*0.04)*CENTRE_N[ci]));
  const sta=Math.max(1,CENTRE_N[ci]-inc-mod);
  const dominant=sta>mod&&sta>inc?'stable':mod>inc?'mod_stable':'inconsistent';
  return{vals:[inc,mod,sta],dominant};
}

function getPattern(ci,ai){
  const prog=ai/14;const r=sr(ci*800+ai*31);
  const base=[0.13+prog*0.02,0.18-prog*0.03,0.20,0.24+prog*0.04,0.14-prog*0.02,0.11-prog*0.01];
  const noisy=base.map(v=>Math.max(0.01,v+r()*0.03-0.015));
  const sum=noisy.reduce((a,b)=>a+b,0);
  const n=CENTRE_N[ci];
  return noisy.map(v=>Math.max(1,Math.round(v/sum*n)));
}

function getFlag(ci,ai,seed){
  const prog=ai/14;const r=sr(ci*900+ai*37+seed);
  const fire=Math.max(1,Math.round((0.22-prog*0.10+r()*0.04)*CENTRE_N[ci]));
  const watch=Math.max(1,Math.round((0.38+r()*0.04)*CENTRE_N[ci]));
  const none=Math.max(1,CENTRE_N[ci]-fire-watch);
  return[fire,watch,none];
}

// ── COLOUR INTENSITY FOR HEATMAPS ─────────────────────────────────────────────
function bpiIntensity(li,pct){
  const stops=[
    ["#FAECE7","#F09070","#D85A30","#993C1D","#712B13"],
    ["#FAEEDA","#FAC775","#EF9F27","#BA7517","#854F0B"],
    ["#E1F5EE","#9FE1CB","#5DCAA5","#1D9E75","#0F6E56"],
    ["#9FE1CB","#5DCAA5","#1D9E75","#0F6E56","#085041"],
  ];
  const txts=[
    ["#712B13","#712B13","#FAECE7","#FAECE7","#FAECE7"],
    ["#633806","#633806","#412402","#412402","#FAEEDA"],
    ["#085041","#085041","#04342C","#E1F5EE","#E1F5EE"],
    ["#04342C","#04342C","#E1F5EE","#E1F5EE","#9FE1CB"],
  ];
  const i=pct<40?0:pct<55?1:pct<70?2:pct<85?3:4;
  return{bg:stops[li][i],txt:txts[li][i]};
}

function dciIntensity(li,pct){
  const stops=[
    ["#712B13","#993C1D","#D85A30","#F09070","#FAECE7"],
    ["#D85A30","#E07050","#EF9F27","#FAEEDA","#FFF5E8"],
    ["#EF9F27","#FAEEDA","#E1F5EE","#9FE1CB","#5DCAA5"],
    ["#5DCAA5","#1D9E75","#0F6E56","#085041","#04342C"],
    ["#1D9E75","#0F6E56","#085041","#04342C","#002820"],
    ["#085041","#04342C","#002820","#001810","#000C08"],
  ];
  const txts=[
    ["#FAECE7","#FAECE7","#FAECE7","#712B13","#712B13"],
    ["#FAECE7","#FAECE7","#633806","#633806","#633806"],
    ["#633806","#633806","#085041","#04342C","#04342C"],
    ["#04342C","#E1F5EE","#E1F5EE","#9FE1CB","#9FE1CB"],
    ["#E1F5EE","#E1F5EE","#9FE1CB","#9FE1CB","#9FE1CB"],
    ["#9FE1CB","#9FE1CB","#9FE1CB","#9FE1CB","#9FE1CB"],
  ];
  const i=pct<15?0:pct<30?1:pct<50?2:pct<70?3:4;
  return{bg:stops[li][Math.min(i,4)],txt:txts[li][Math.min(i,4)]};
}

function genericIntensity(val,max,colKey){
  const c=COL[colKey];
  const alpha=0.2+0.8*(val/max);
  return{bg:c[0],txt:c[1],alpha};
}

// ── RENDER HELPERS ─────────────────────────────────────────────────────────────
function legend(items){
  return `<div class="leg-row">${items.map(([bg,label])=>`<div class="leg"><div class="leg-sq" style="background:${bg}"></div>${label}</div>`).join('')}</div>`;
}

function heatmapTable(rowFn, colFn, cellFn, drillFn, id){
  let h=`<div class="hm-outer"><table class="hmt"><colgroup><col style="width:108px">`;
  ASMS.forEach(()=>h+=`<col style="width:52px">`);
  h+=`</colgroup><tr><td></td>`;
  ASMS.forEach(a=>h+=`<td class="clbl">${a}</td>`);
  h+=`</tr>`;
  CENTRES.forEach((c,ci)=>{
    h+=`<tr><td class="rlbl">${c}</td>`;
    ASMS.forEach((_,ai)=>{
      const cell=cellFn(ci,ai);
      if(!cell){
        h+=`<td class="hmc hmc-na"><div class="hmc-i"><span style="font-size:9px;color:#bbb">N/A</span></div></td>`;
        return;
      }
      h+=`<td class="hmc" style="background:${cell.bg}" data-ci="${ci}" data-ai="${ai}" onclick="${drillFn}(this,'${id}')">
        <div class="hmc-i">
          <span class="hmc-p" style="color:${cell.txt}">${cell.pct}%</span>
          <span class="hmc-l" style="color:${cell.txt}">${cell.label}</span>
        </div>
      </td>`;
    });
    h+=`</tr>`;
  });
  h+=`</table></div>`;
  return h;
}

function drillDistBar(vals,total,labels,fills,txts,prev){
  let h=`<div class="dist-bar">`;
  vals.forEach((v,i)=>{
    const pct=Math.round(v/total*100);
    if(pct<1)return;
    h+=`<div class="dist-seg" style="width:${pct}%;background:${fills[i]}">
      ${pct>=10?`<span class="ds-p" style="color:${txts[i]}">${pct}%</span>`:''}
      ${pct>=14?`<span class="ds-n" style="color:${txts[i]}">n=${v}</span>`:''}
    </div>`;
  });
  h+=`</div><div class="delta-grid" style="grid-template-columns:repeat(${Math.min(vals.length,4)},1fr)">`;
  const LBG=fills.map(f=>f+'22');
  vals.forEach((v,i)=>{
    const pct=Math.round(v/total*100);
    const pp=prev?Math.round(prev[i]/prev.reduce((a,b)=>a+b,0)*100):null;
    const delta=pp!==null?pct-pp:null;
    const ds=delta===null?'first assessment':delta>0?`+${delta}% from prev`:delta<0?`${delta}% from prev`:'no change';
    const dc=delta===null?'nc':delta>0?'up':delta<0?'dn':'nc';
    h+=`<div class="dcard" style="background:${fills[i]}22">
      <div class="dc-ct" style="color:${fills[i]}">${v}</div>
      <div class="dc-nm" style="color:${fills[i]}">${labels[i]}</div>
      <div class="dc-bw"><div class="dc-bf" style="width:${pct}%;background:${fills[i]}"></div></div>
      <div class="dc-d ${dc}">${ds}</div>
    </div>`;
  });
  h+=`</div>`;
  return h;
}

    <div class="card-tag">Procrastination Index (PI)</div>
    <div class="card-title">Start timing pattern — all centres × 15 assessments</div>
    <div class="card-sub">PI = attempt_start / window · Early &lt;0.20 · Mid 0.20–0.60 · Late &gt;0.60 · Late starts 3+ times triggers study-schedule alert</div>`;
  h+=heatmapTable(null,null,piDom,'doDrill','pi');
  h+=legend([["#1D9E75","Early (PI < 0.20)"],["#EF9F27","Mid (0.20–0.60)"],["#D85A30","Late (PI > 0.60)"]]);
  h+=`</div><div id="pi_drill"></div>`;

  // UMS — stat cards per centre (latest assessment)
  h+=`<div class="card">
    <div class="card-tag">Uncertainty Mastery Score (UMS)</div>
    <div class="card-title">UMS label distribution — per centre · high-uncertainty assessments only</div>
    <div class="card-sub">UMS = mean ES where unc ≥ 0.60 · Only computed for learners in high-uncertainty assessments · N/A when unc &lt; 0.60 · Select assessment to view</div>
    <div class="card-filters">
      <label>Assessment</label>
      <select id="umsSel" onchange="renderUMSCards()">
        ${ASMS.map((a,i)=>`<option value="${i}">${a}</option>`).join('')}
      </select>
    </div>
    <div id="umsCards" class="stat-grid"></div>`;
  h+=legend([["#D85A30","Struggling (< 40)"],["#EF9F27","Improving (40–69)"],["#1D9E75","Strong (≥ 70)"]]);
  h+=`<div class="note">Card shows computable count (unc ≥ 0.60) + label distribution for those learners + N/A count</div>`;
  h+=`</div>`;

  // CI Time
  const ciDom=(ci,ai)=>{
    if(ai<2) return null;
    const {vals,dominant}=getCITime(ci,ai);
    const n=vals.reduce((a,b)=>a+b,0);
    const pct=Math.round(vals[dominant==='stable'?2:dominant==='mod_stable'?1:0]/n*100);
    const LF={inconsistent:"#D85A30",mod_stable:"#EF9F27",stable:"#1D9E75"};
    const LT={inconsistent:"#FAECE7",mod_stable:"#412402",stable:"#E1F5EE"};
    const LN={inconsistent:"Inconsistent",mod_stable:"Mod. Stable",stable:"Stable"};
    return{bg:LF[dominant],txt:LT[dominant],pct,label:LN[dominant]};
  };
  h+=`<div class="card">
    <div class="card-tag">Performance Consistency — CI Time</div>
    <div class="card-title">Dominant CI Time label — all centres × assessments 3–15</div>
    <div class="card-sub">CI Time = (1 − pstdev(session_totals) / mean(session_totals)) × 100 · Requires ≥ 3 assessments · A1 and A2 always N/A · Click cell for breakdown</div>`;
  h+=heatmapTable(null,null,ciDom,'doDrill','citime');
  h+=legend([["#D85A30","Inconsistent (< 50)"],["#EF9F27","Moderately stable (50–74)"],["#1D9E75","Stable (≥ 75)"]]);
  h+=`</div><div id="citime_drill"></div>`;

  document.getElementById('tab1').innerHTML=h;
  renderUMSCards();
}

function renderUMSCards(){
  const ai=parseInt(document.getElementById('umsSel')?.value||14);
  let h='';
  CENTRES.forEach((c,ci)=>{
    const {comp,vals,na}=getUMS(ci,ai);
    const total=vals.reduce((a,b)=>a+b,0);
    h+=`<div class="stat-card">
      <div class="sc-centre">${c}</div>
      <div class="sc-comp">${comp} of ${CENTRE_N[ci]} learners · unc ≥ 0.60</div>
      <div class="sc-bar">`;
    [[vals[0],"#D85A30"],[vals[1],"#EF9F27"],[vals[2],"#1D9E75"]].forEach(([v,bg])=>{
      const pct=Math.round(v/total*100);
      if(pct<1)return;
      h+=`<div class="sc-seg" style="width:${pct}%;background:${bg};color:#fff">${pct>=15?pct+'%':''}</div>`;
    });
    h+=`</div><div style="font-size:10px;color:#aaa;margin-top:3px">${na} learners N/A this assessment</div>
    </div>`;
  });
  const el=document.getElementById('umsCards');
  if(el) el.innerHTML=h;
}

// ── TAB 2: AUTONOMY & TOOL USE ────────────────────────────────────────────────
function renderTab2(){
  let h='';

  // Tool pattern
  const patDom=(ci,ai)=>{
    const vals=getPattern(ci,ai);
    const n=vals.reduce((a,b)=>a+b,0);
    const di=vals.indexOf(Math.max(...vals));
    const pct=Math.round(vals[di]/n*100);
    const LF=["#085041","#B5D4F4","#EF9F27","#1D9E75","#D85A30","#712B13"];
    const LT=["#9FE1CB","#0C447C","#412402","#E1F5EE","#FAECE7","#FAECE7"];
    const LN=["Independent","Passive","Moderate","Strategic","Dep. Short.","Over-reliant"];
    return{bg:LF[di],txt:LT[di],pct,label:LN[di]};
  };
  h+=`<div class="card">
    <div class="card-tag">AI Tool Use Pattern (TDR × TUI)</div>
    <div class="card-title">Dominant tool use pattern — all centres × 15 assessments</div>
    <div class="card-sub">TDR = sum(tool_time) / sum(answer_time) · TUI = reflective_uses / total_uses × 100 · Pattern derived from TDR × TUI thresholds · Click cell for full distribution</div>`;
  h+=heatmapTable(null,null,patDom,'doDrill','pattern');
  h+=legend([
    ["#085041","Independent (TDR < 0.20)"],["#B5D4F4","Passive (TDR 0.20–0.50, TUI < 40)"],
    ["#EF9F27","Moderate user (TDR 0.20–0.50, TUI 40–69)"],["#1D9E75","Strategic (TDR 0.20–0.50, TUI ≥ 70)"],
    ["#D85A30","Dependent shortcutter (TDR > 0.50, TUI < 40)"],["#712B13","Over-reliant thinker (TDR > 0.50, TUI ≥ 40)"]
  ]);
  h+=`</div><div id="pattern_drill"></div>`;

  // G10 Impulsive
  const g10Dom=(ci,ai)=>{
    const [fire,watch,none]=getFlag(ci,ai,1001);
    const n=fire+watch+none;
    const firePct=Math.round(fire/n*100);
    const dom=fire/n>0.25?'fire':watch/n>0.45?'watch':'none_f';
    const LF={fire:"#D85A30",watch:"#EF9F27",none_f:"#E8EFF3"};
    const LT={fire:"#FAECE7",watch:"#412402",none_f:"#555"};
    const LN={fire:"Fires",watch:"Watch",none_f:"None"};
    return{bg:LF[dom],txt:LT[dom],pct:firePct,label:LN[dom]};
  };
  h+=`<div class="card">
    <div class="card-tag">Impulsive Decisions — G10</div>
    <div class="card-title">Impulsive flag distribution — all centres × 15 assessments</div>
    <div class="card-sub">Fires when ALL-IN + es_user &lt; 0.40 + dt_ratio &lt; 0.30 · 0 = None · 1–2 = Watch · ≥3 = Fires · Cell % = proportion of learners at Fire level</div>`;
  h+=heatmapTable(null,null,g10Dom,'doDrill','g10');
  h+=legend([["#D85A30","Fires (≥ 3 impulsive decisions)"],["#EF9F27","Watch (1–2)"],["#E8EFF3","None"]]);
  h+=`</div><div id="g10_drill"></div>`;

  // G11 Missed Opportunity
  const g11Dom=(ci,ai)=>{
    const [fire,watch,none]=getFlag(ci,ai,2002);
    const n=fire+watch+none;
    const firePct=Math.round(fire/n*100);
    const dom=fire/n>0.22?'fire':watch/n>0.42?'watch':'none_f';
    const LF={fire:"#D85A30",watch:"#EF9F27",none_f:"#E8EFF3"};
    const LT={fire:"#FAECE7",watch:"#412402",none_f:"#555"};
    const LN={fire:"Fires",watch:"Watch",none_f:"None"};
    return{bg:LF[dom],txt:LT[dom],pct:firePct,label:LN[dom]};
  };
  h+=`<div class="card">
    <div class="card-tag">Missed Opportunities — G11</div>
    <div class="card-title">Missed opportunity flag distribution — all centres × 15 assessments</div>
    <div class="card-sub">Fires when SKIP + es_shadow ≥ 0.70 · 0 = None · 1 = Watch · ≥2 = Fires · Cell % = proportion of learners at Fire level · Click for full breakdown</div>`;
  h+=heatmapTable(null,null,g11Dom,'doDrill','g11');
  h+=legend([["#D85A30","Fires (≥ 2 missed opportunities)"],["#EF9F27","Watch (1)"],["#E8EFF3","None"]]);
  h+=`</div><div id="g11_drill"></div>`;

  document.getElementById('tab2').innerHTML=h;
}

// ── WIRE DRILL ─────────────────────────────────────────────────────────────────
window.doDrill=function(td,id){
  document.querySelectorAll(`[data-ci]`).forEach(c=>{
    if(c.closest(`#tab${curTab}`)) c.classList.remove('sel');
  });
  td.classList.add('sel');
  const ci=+td.dataset.ci,ai=+td.dataset.ai;
  const fn=window[`drill_${id}`];
  if(fn) fn(ci,ai,id);
};

renderTab0();
</script>
