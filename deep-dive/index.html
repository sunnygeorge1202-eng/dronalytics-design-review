<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dronalytics — Admin Deep Dive Analytics</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#F2F4F7;color:#1a1a1a;font-size:13px}
.topbar{background:#1B3A4B;padding:13px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar .brand{color:#fff;font-weight:700;font-size:15px}
.topbar .sub{color:#90b4c8;font-size:12px}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px 60px}

.filter-bar{background:#fff;border:1px solid #dde3e8;border-radius:10px;padding:12px 18px;margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filter-bar label{font-size:11px;color:#888;font-weight:500}
.filter-bar select{font-size:12px;padding:5px 9px;border:1px solid #dde3e8;border-radius:6px;background:#fff}
.lcount{margin-left:auto;font-size:12px;color:#888}
.lcount strong{color:#1B3A4B}

.tab-bar{display:flex;border-bottom:1px solid #dde3e8;margin-bottom:16px}
.tab-btn{padding:10px 18px;border:none;background:transparent;font-size:13px;color:#888;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab-btn.on{color:#1B3A4B;font-weight:600;border-bottom-color:#1B3A4B}

.card{background:#fff;border:1px solid #dde3e8;border-radius:12px;padding:18px 20px;margin-bottom:14px}
.card-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#aaa;margin-bottom:3px}
.card-title{font-size:13px;font-weight:600;color:#1B3A4B;margin-bottom:3px}
.card-sub{font-size:11px;color:#aaa;margin-bottom:14px;line-height:1.5}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.card-filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.card-filters label{font-size:11px;color:#888}
.card-filters select{font-size:11px;padding:4px 7px;border:1px solid #dde3e8;border-radius:5px;background:#fff}
.tgl{display:flex;border:1px solid #ccc;border-radius:6px;overflow:hidden}
.tgl button{padding:5px 14px;font-size:11px;background:#fff;border:none;cursor:pointer;color:#666}
.tgl button.on{background:#1B3A4B;color:#fff;font-weight:600}

.asm-slider{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.asm-slider label{font-size:11px;color:#888;white-space:nowrap}
.asm-slider input[type=range]{flex:1;accent-color:#1B3A4B}
.asm-slider .asm-val{font-size:12px;font-weight:600;color:#1B3A4B;min-width:28px}

/* HEATMAP */
.hm-outer{overflow-x:auto}
.hmt{border-collapse:separate;border-spacing:2px;table-layout:fixed}
.hmt .rlbl{font-size:11px;color:#555;text-align:right;padding-right:8px;white-space:nowrap;vertical-align:middle;font-weight:500;width:108px;min-width:108px}
.hmt .clbl{font-size:9px;color:#aaa;text-align:center;padding-bottom:4px}
.hmc{height:36px;width:50px;min-width:50px;border-radius:5px;cursor:pointer;vertical-align:middle;transition:transform .1s}
.hmc:hover{transform:scale(1.1);position:relative;z-index:3}
.hmc.sel{outline:2.5px solid #1B3A4B;outline-offset:1px;position:relative;z-index:4}
.hmc-na{background:#f0f2f4!important;border:1px dashed #ccc;cursor:default}
.hmc-na:hover{transform:none}

/* STACKED BARS (slider view) */
.sb-wrap{display:flex;flex-direction:column;gap:8px}
.sb-row{display:flex;align-items:center;gap:10px}
.sb-lbl{font-size:11px;color:#555;font-weight:500;min-width:108px;white-space:nowrap}
.sb-bar{flex:1;display:flex;height:26px;border-radius:5px;overflow:hidden;cursor:pointer}
.sb-seg{height:100%;transition:width .3s}
.sb-seg:hover{opacity:.85}

/* WAFFLE */
.waffle-grid-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.waffle-block{border:1px solid #eee;border-radius:8px;padding:12px;cursor:pointer}
.waffle-centre{font-size:11px;font-weight:600;color:#1B3A4B;margin-bottom:6px}
.w-grid{display:flex;flex-wrap:wrap;gap:3px}
.wsq{width:11px;height:11px;border-radius:2px;cursor:pointer;transition:transform .1s}
.wsq:hover{transform:scale(1.3)}
.wsq.sel-w{outline:2px solid #1B3A4B;outline-offset:1px}

/* LOLLIPOP */
.lp-wrap{display:flex;flex-direction:column;gap:8px}
.lp-row{display:flex;align-items:center;gap:10px}
.lp-lbl{font-size:11px;color:#555;font-weight:500;min-width:108px;white-space:nowrap}
.lp-track{flex:1;height:24px;background:#f0f2f4;border-radius:4px;position:relative;cursor:pointer;overflow:visible}
.lp-track:hover .lp-stem{opacity:.8}
.lp-stem{height:8px;border-radius:3px;position:absolute;top:8px;left:0;transition:width .3s}
.lp-dot{width:18px;height:18px;border-radius:50%;position:absolute;top:3px;border:2px solid #fff;cursor:pointer;transition:transform .1s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.lp-dot:hover{transform:scale(1.15)}
.lp-dot.sel-dot{outline:2.5px solid #1B3A4B;outline-offset:2px}
.lp-thresh{position:absolute;top:0;height:100%;width:1.5px;background:#aaa;opacity:.5}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat-card{border-radius:8px;padding:12px;border:1px solid #eee}
.sc-centre{font-size:11px;font-weight:600;color:#1B3A4B;margin-bottom:5px}
.sc-comp{font-size:10px;color:#888;margin-bottom:6px}
.sc-bar{display:flex;height:16px;border-radius:4px;overflow:hidden;margin-bottom:4px;cursor:pointer}
.sc-seg{cursor:pointer;transition:opacity .15s}
.sc-seg:hover{opacity:.8}

/* DOT PLOT */
.dot-svg-wrap{overflow-x:auto}

/* DRILL */
.drill-l1{background:#EEF4F8;border:1px solid #c5d8e4;border-radius:10px;padding:14px 16px;margin-bottom:8px;margin-top:10px}
.drill-l2{background:#F0F8F4;border:1px solid #b2d9c4;border-radius:10px;padding:14px 16px;margin-bottom:8px}
.drill-l3{background:#fff;border:1px solid #dde3e8;border-radius:10px;padding:14px 16px;margin-bottom:14px}
.drill-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#5a8aa0;margin-bottom:3px}
.drill-title{font-size:13px;font-weight:600;color:#1B3A4B;margin-bottom:8px}
.drill-ctx{font-size:11px;color:#6a8fa0;margin-bottom:10px}
.drill-empty{font-size:12px;color:#aaa;font-style:italic}
.l1-bar{display:flex;height:32px;border-radius:6px;overflow:hidden;margin-bottom:5px}
.l1-seg{height:100%;cursor:pointer;transition:opacity .15s}
.l1-seg:hover{opacity:.8}
.l1-seg.sel-seg{outline:2.5px solid #1B3A4B;outline-offset:-2px}
.l1-labels{display:flex;margin-bottom:4px}
.l1-lbl{font-size:10px;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:0 1px}
.delta-grid{display:grid;gap:6px;margin-top:8px}
.dcard{border-radius:7px;padding:9px 11px;cursor:pointer;transition:opacity .15s}
.dcard:hover{opacity:.85}
.dcard.sel-dc{outline:2px solid #1B3A4B}
.dc-ct{font-size:20px;font-weight:600;line-height:1}
.dc-nm{font-size:10px;margin-top:2px}
.dc-bw{height:4px;border-radius:2px;margin-top:5px;background:rgba(0,0,0,.08)}
.dc-bf{height:100%;border-radius:2px}
.dc-d{font-size:10px;margin-top:4px;font-weight:500}
.up{color:#0F6E56}.dn{color:#993C1D}.nc{color:#aaa}
.learner-tbl{width:100%;border-collapse:collapse;font-size:12px}
.learner-tbl th{text-align:left;font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.4px;padding:6px 8px;border-bottom:1px solid #eee}
.learner-tbl td{padding:7px 8px;border-bottom:1px solid #f5f5f5}
.learner-tbl tr:last-child td{border-bottom:none}
.learner-tbl tr:hover td{background:#f9fafb}
.lpill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px}
.thin-warn{background:#FAEEDA;color:#633806;border-radius:6px;padding:6px 10px;font-size:11px;margin-bottom:8px}
.leg-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#777}
.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.note{font-size:10px;color:#bbb;font-style:italic;margin-top:8px}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">Dronalytics</span>
  <span class="sub">Admin · Deep Dive Analytics · 15 Assessments</span>
</div>
<div class="wrap">

<div class="filter-bar">
  <label>CEFR level</label>
  <select id="fCEFR" onchange="onCEFRChange()">
    <option value="all">All levels</option>
    <option value="A2">A2</option>
    <option value="B1">B1</option>
    <option value="B2">B2</option>
  </select>
  <div class="lcount">👥 <strong id="totalCount">142</strong> learners in view</div>
</div>

<div class="tab-bar">
  <button class="tab-btn on" onclick="setTab(0)">Mastery &amp; Decisions</button>
  <button class="tab-btn" onclick="setTab(1)">Self-Awareness</button>
  <button class="tab-btn" onclick="setTab(2)">Autonomy &amp; Tool Use</button>
</div>

<div id="tab0"></div>
<div id="tab1" style="display:none"></div>
<div id="tab2" style="display:none"></div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const CENTRES=["GIZ Trivandrum","ILS Kochi","ACL Calicut","YMCA Thrissur","KASE Kozhikode","IHRM Palakkad"];
const BASE_N=[58,42,61,38,35,28];
const BLOOMS=["Remember","Understand","Apply","Analyse","Evaluate","Create"];
const SKILLS=["Writing","Reading","Listening","Speaking"];
const N_ASM=15;
const ASMS=Array.from({length:N_ASM},(_,i)=>`A${i+1}`);
const CLRS_C=["#2a78d6","#1baf7a","#eda100","#4a3aa7","#e34948","#e87ba4"];
const CEFR_OPTS=["A2","B1","B2"];
const BATCHES=["Batch 1","Batch 2","Batch 3"];
const FNAMES=["Anjali","Priya","Rajan","Meera","Joseph","Divya","Anoop","Sreeja","Vishnu","Nithya","Arun","Lakshmi","Kiran","Pooja","Rahul","Deepa","Suresh","Anitha","Praveen","Rekha","Sanjay","Uma","Manoj","Geetha","Vijay","Sindhu","Anil","Deepika","Harish","Kavitha"];
const LNAMES=["M.","K.","S.","T.","P.","R.","N.","V.","A.","J."];

// ── METRIC COLOUR DEFINITIONS ──────────────────────────────────────────────────
const M={
  bpi:{F:["#D85A30","#EF9F27","#1D9E75","#085041"],T:["#FAECE7","#412402","#E1F5EE","#9FE1CB"],N:["Developing","Emerging","Proficient","Strong"],lbl:"BPI Label"},
  dci:{F:["#712B13","#D85A30","#EF9F27","#5DCAA5","#1D9E75","#085041"],T:["#FAECE7","#FAECE7","#412402","#04342C","#E1F5EE","#9FE1CB"],N:["Fragile","Emerging","Developing","Competent","Strong","Highly Reliable"],lbl:"DCI Label"},
  zone:{F:["#085041","#1D9E75","#EF9F27","#D85A30"],T:["#9FE1CB","#E1F5EE","#412402","#FAECE7"],N:["Zone 1 · Ready Performer","Zone 2 · Assisted Performer","Zone 3 · Emerging Independent","Zone 4 · At Risk"],lbl:"Zone"},
  dqs:{F:["#D85A30","#EF9F27","#1D9E75"],T:["#FAECE7","#412402","#E1F5EE"],N:["Low","Improving","Aligned"],lbl:"DQS Label"},
  ccg:{F:["#2a78d6","#1D9E75","#D85A30"],T:["#fff","#E1F5EE","#FAECE7"],N:["Underestimated","Calibrated","Overestimated"],lbl:"CCG Label"},
  pi:{F:["#1D9E75","#EF9F27","#D85A30"],T:["#E1F5EE","#412402","#FAECE7"],N:["Early","Mid","Late"],lbl:"Start timing"},
  ums:{F:["#D85A30","#EF9F27","#1D9E75"],T:["#FAECE7","#412402","#E1F5EE"],N:["Struggling","Improving","Strong"],lbl:"UMS Label"},
  citime:{F:["#D85A30","#EF9F27","#1D9E75"],T:["#FAECE7","#412402","#E1F5EE"],N:["Inconsistent","Mod. stable","Stable"],lbl:"CI Time Label"},
  pattern:{F:["#085041","#B5D4F4","#EF9F27","#1D9E75","#D85A30","#712B13"],T:["#9FE1CB","#0C447C","#412402","#E1F5EE","#FAECE7","#FAECE7"],N:["Independent","Passive user","Moderate user","Strategic user","Dependent shortcutter","Over-reliant thinker"],lbl:"Tool use pattern"},
  g10:{F:["#D85A30","#EF9F27","#E8EFF3"],T:["#FAECE7","#412402","#555"],N:["Fires (≥3)","Watch (1–2)","None"],lbl:"G10 Status"},
  g11:{F:["#D85A30","#EF9F27","#E8EFF3"],T:["#FAECE7","#412402","#555"],N:["Fires (≥2)","Watch (1)","None"],lbl:"G11 Status"},
};

// ── CEFR FILTER ────────────────────────────────────────────────────────────────
let selCEFR="all";
function onCEFRChange(){
  selCEFR=document.getElementById('fCEFR').value;
  const total=CENTRES.reduce((s,_,ci)=>s+getCentreN(ci),0);
  document.getElementById('totalCount').textContent=total;
  renderAll();
}
function getCentreN(ci){
  if(selCEFR==='all') return BASE_N[ci];
  const r=sr(ci*777+CEFR_OPTS.indexOf(selCEFR)*333);
  const ratios=[0.35,0.42,0.23];
  const ri=CEFR_OPTS.indexOf(selCEFR);
  return Math.max(3,Math.round(BASE_N[ci]*(ratios[ri]+r()*0.08-0.04)));
}

// ── SEEDED RANDOM ──────────────────────────────────────────────────────────────
function sr(seed){let s=Math.abs(Math.round(seed))|1;return()=>{s=(s*9301+49297)%233280;return s/233280}}

// ── LEARNER ROSTER ─────────────────────────────────────────────────────────────
function getLearners(ci){
  const n=getCentreN(ci);
  const cefrIdx=CEFR_OPTS.indexOf(selCEFR);
  return Array.from({length:n},(_,i)=>{
    const r=sr(ci*1000+i*7+(cefrIdx+1)*500);
    const cefr=selCEFR==='all'?CEFR_OPTS[Math.floor(r()*3)]:selCEFR;
    return{
      id:i,
      name:FNAMES[Math.floor(r()*FNAMES.length)]+' '+LNAMES[Math.floor(r()*LNAMES.length)],
      cefr,
      batch:BATCHES[Math.floor(r()*3)]
    };
  });
}

// ── DATA GENERATOR ─────────────────────────────────────────────────────────────
function getDist(ci,ai,metricKey,customSeed){
  const n=getCentreN(ci);
  const nL=M[metricKey].N.length;
  const cefrOffset=selCEFR==='all'?0:CEFR_OPTS.indexOf(selCEFR)*111;
  const seed=(customSeed||0)+ci*1000+ai*100+cefrOffset;
  const r=sr(seed);
  const prog=ai/14;
  // bias toward positive labels over time
  let vals=Array.from({length:nL},(_,i)=>{
    const base=r();
    const trend=i>nL/2?prog*0.3:-prog*0.2;
    return Math.max(0.03,base+trend);
  });
  const sum=vals.reduce((a,b)=>a+b,0);
  const counts=vals.map(v=>Math.max(1,Math.round(v/sum*n)));
  const diff=n-counts.reduce((a,b)=>a+b,0);
  counts[counts.length-1]=Math.max(1,counts[counts.length-1]+diff);
  return counts;
}

function getBPI(ci,si,bi,ai){
  const n=getCentreN(ci);
  const cefrOffset=selCEFR==='all'?0:CEFR_OPTS.indexOf(selCEFR)*111;
  const seed=ci*10000+si*1000+bi*100+ai+cefrOffset;
  const r=sr(seed);
  const thin=r()<(bi>=4?0.35:0.08);
  const counts=getDist(ci,ai,'bpi',ci*10000+si*1000+bi*100);
  return{vals:counts,n,thin};
}

function getUMS(ci,ai){
  const n=getCentreN(ci);
  const r=sr(ci*800+ai*23+(selCEFR==='all'?0:CEFR_OPTS.indexOf(selCEFR)*77));
  const comp=Math.max(3,Math.round((0.32+r()*0.12)*n));
  const vals=getDist(ci,ai,'ums',ci*800+ai*23+(selCEFR==='all'?0:CEFR_OPTS.indexOf(selCEFR)*77)+5000);
  return{comp,vals,na:n-comp};
}

// ── BPI INTENSITY ──────────────────────────────────────────────────────────────
function bpiIntensity(li,pct){
  const stops=[["#FAECE7","#F09070","#D85A30","#993C1D","#712B13"],["#FAEEDA","#FAC775","#EF9F27","#BA7517","#854F0B"],["#E1F5EE","#9FE1CB","#5DCAA5","#1D9E75","#0F6E56"],["#9FE1CB","#5DCAA5","#1D9E75","#0F6E56","#085041"]];
  const i=pct<40?0:pct<55?1:pct<70?2:pct<85?3:4;
  return stops[li][i];
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
function legend(mk){
  return`<div class="leg-row">${M[mk].N.map((n,i)=>`<div class="leg"><div class="leg-sq" style="background:${M[mk].F[i]}"></div>${n}</div>`).join('')}</div>`;
}
function drillPanels(id){
  return`<div id="${id}_l1"><div class="drill-l1"><div class="drill-empty">Click any element above to see label distribution for that centre and assessment.</div></div></div><div id="${id}_l2"></div><div id="${id}_l3"></div>`;
}
function buildHeatmap(id,cellFn){
  let h=`<div class="hm-outer"><table class="hmt"><colgroup><col style="width:108px">${ASMS.map(()=>`<col style="width:50px">`).join('')}</colgroup><tr><td></td>${ASMS.map(a=>`<td class="clbl">${a}</td>`).join('')}</tr>`;
  CENTRES.forEach((c,ci)=>{
    h+=`<tr><td class="rlbl">${c}</td>`;
    ASMS.forEach((_,ai)=>{
      const cell=cellFn(ci,ai);
      if(!cell) h+=`<td class="hmc hmc-na"></td>`;
      else h+=`<td class="hmc" style="background:${cell}" data-ci="${ci}" data-ai="${ai}" data-id="${id}" onclick="hmClick(this)"></td>`;
    });
    h+=`</tr>`;
  });
  return h+`</table></div>`;
}
window.hmClick=function(td){
  document.querySelectorAll('.hmc.sel').forEach(e=>e.classList.remove('sel'));
  td.classList.add('sel');
  L1(td.dataset.id,+td.dataset.ci,+td.dataset.ai);
};

// ── STACKED BARS (slider view) ─────────────────────────────────────────────────
function stackedBars(id,ai){
  let h=`<div class="sb-wrap">`;
  CENTRES.forEach((c,ci)=>{
    const vals=getDist(ci,ai,id,id.charCodeAt(0)*500);
    const total=vals.reduce((a,b)=>a+b,0);
    h+=`<div class="sb-row"><div class="sb-lbl">${c}</div><div class="sb-bar" data-ci="${ci}" data-ai="${ai}" data-id="${id}" onclick="sbClick(this)">`;
    vals.forEach((v,li)=>{const pct=Math.round(v/total*100);if(pct<1)return;h+=`<div class="sb-seg" style="width:${pct}%;background:${M[id].F[li]}"></div>`;});
    h+=`</div></div>`;
  });
  return h+`</div>`;
}
window.sbClick=function(bar){
  document.querySelectorAll('.sb-bar.sel-sb').forEach(e=>e.classList.remove('sel-sb'));
  bar.classList.add('sel-sb');
  L1(bar.dataset.id,+bar.dataset.ci,+bar.dataset.ai);
};

// ── WAFFLE ─────────────────────────────────────────────────────────────────────
function buildWaffle(ai){
  let h=`<div class="waffle-grid-wrap">`;
  CENTRES.forEach((c,ci)=>{
    const vals=getDist(ci,ai,'zone',3000);
    const squares=[];
    vals.forEach((v,li)=>{for(let j=0;j<v;j++)squares.push(li)});
    h+=`<div class="waffle-block" onclick="waffleClick(${ci},${ai})">
      <div class="waffle-centre">${c}</div>
      <div class="w-grid">${squares.map(li=>`<div class="wsq" style="background:${M.zone.F[li]}" title="${M.zone.N[li]}"></div>`).join('')}</div>
    </div>`;
  });
  return h+`</div>`;
}
window.waffleClick=function(ci,ai){L1('zone',ci,ai)};

// ── LOLLIPOP ───────────────────────────────────────────────────────────────────
function buildLollipop(id,ai){
  let h=`<div class="lp-wrap">`;
  CENTRES.forEach((c,ci)=>{
    const vals=getDist(ci,ai,id,id==='g10'?1001:2002);
    const total=vals.reduce((a,b)=>a+b,0);
    const firePct=Math.round(vals[0]/total*100);
    const watchPct=Math.round(vals[1]/total*100);
    const dom=firePct>22?0:watchPct>45?1:2;
    h+=`<div class="lp-row">
      <div class="lp-lbl">${c}</div>
      <div class="lp-track" data-ci="${ci}" data-ai="${ai}" data-id="${id}" onclick="lpClick(this)">
        <div class="lp-stem" style="width:${firePct}%;background:${M[id].F[0]}"></div>
        <div class="lp-dot" style="left:calc(${firePct}% - 9px);background:${M[id].F[dom]}" title="${c} · A${ai+1} · Fire: ${firePct}%"></div>
        <div class="lp-thresh" style="left:20%"></div>
      </div>
    </div>`;
  });
  return h+`</div>`;
}
window.lpClick=function(track){
  document.querySelectorAll('.lp-dot.sel-dot').forEach(e=>e.classList.remove('sel-dot'));
  const dot=track.querySelector('.lp-dot');
  if(dot) dot.classList.add('sel-dot');
  L1(track.dataset.id,+track.dataset.ci,+track.dataset.ai);
};

// ── DOT PLOT (CCG) ─────────────────────────────────────────────────────────────
function buildDotPlot(){
  const W=860,H=110,PL=110,PR=16,PT=16,PB=26;
  const gW=W-PL-PR,gH=H-PT-PB,xStep=gW/14;
  const Y_POS=[0.15,1,0.5]; // Under=low, Cal=top, Over=mid
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">`;
  // grid lines + labels
  M.ccg.N.forEach((label,i)=>{
    const y=PT+gH-(Y_POS[i])*gH;
    svg+=`<text x="${PL-6}" y="${y+3}" text-anchor="end" font-size="9" fill="${M.ccg.F[i]}" font-family="sans-serif" font-weight="500">${label}</text>`;
    svg+=`<line x1="${PL}" y1="${y}" x2="${PL+gW}" y2="${y}" stroke="#f0f0f0" stroke-width="0.5"/>`;
  });
  for(let ai=0;ai<15;ai++){
    const x=PL+ai*xStep;
    svg+=`<line x1="${x}" y1="${PT}" x2="${x}" y2="${PT+gH}" stroke="#f5f5f5" stroke-width="0.5"/>`;
    svg+=`<text x="${x}" y="${PT+gH+14}" text-anchor="middle" font-size="8" fill="#bbb" font-family="sans-serif">A${ai+1}</text>`;
  }
  CENTRES.forEach((c,ci)=>{
    const col=CLRS_C[ci];
    const pts=[];
    for(let ai=0;ai<15;ai++){
      const vals=getDist(ci,ai,'ccg',5000);
      const total=vals.reduce((a,b)=>a+b,0);
      const di=vals.indexOf(Math.max(...vals));
      pts.push({ai,y:PT+gH-Y_POS[di]*gH,di});
    }
    let pd='';
    pts.forEach((p,i)=>{const x=PL+p.ai*xStep;pd+=i===0?`M${x},${p.y}`:`L${x},${p.y}`});
    svg+=`<path d="${pd}" stroke="${col}" stroke-width="1" fill="none" stroke-dasharray="3 2" opacity=".4"/>`;
    pts.forEach(p=>{
      const x=PL+p.ai*xStep;
      svg+=`<circle cx="${x}" cy="${p.y}" r="5" fill="${M.ccg.F[p.di]}" stroke="${col}" stroke-width="1.5" style="cursor:pointer" onclick="L1('ccg',${ci},${p.ai})" title="${c} · A${p.ai+1} · ${M.ccg.N[p.di]}"/>`;
    });
  });
  svg+=`</svg>`;
  return`<div class="dot-svg-wrap">${svg}</div>`;
}

// ── LEVEL 1 ────────────────────────────────────────────────────────────────────
function L1(id,ci,ai){
  document.querySelectorAll('.hmc.sel').forEach(e=>e.classList.remove('sel'));
  const raw=id==='bpi'?getBPI(ci,bpiSkill,bpiBloom,ai):id==='ums'?{vals:getUMS(ci,ai).vals}:{vals:getDist(ci,ai,id,id.charCodeAt(0)*500+(id==='g10'?1001:id==='g11'?2002:0))};
  const arr=raw.vals;
  const total=arr.reduce((a,b)=>a+b,0);
  const thin=id==='bpi'?getBPI(ci,bpiSkill,bpiBloom,ai).thin:false;
  let segs='',lbls='';
  arr.forEach((v,i)=>{
    const pct=Math.round(v/total*100);
    if(pct<1)return;
    segs+=`<div class="l1-seg" style="width:${pct}%;background:${M[id].F[i]}" data-li="${i}" onclick="L2('${id}',${ci},${ai},${i})" title="${M[id].N[i]}"></div>`;
    lbls+=`<div class="l1-lbl" style="width:${pct}%;color:${M[id].F[i]}">${pct>=12?M[id].N[i].split('·')[0].trim():''}</div>`;
  });
  document.getElementById(id+'_l1').innerHTML=`<div class="drill-l1">
    <div class="drill-tag">Level 1 — Label distribution</div>
    <div class="drill-title">${CENTRES[ci]} · Assessment ${ai+1}</div>
    ${thin?'<div class="thin-warn">Thin data (n &lt; 5 at this Bloom level) — treat as indicative only.</div>':''}
    <div class="drill-ctx">Colour proportion only · click a segment to see counts and change from previous assessment</div>
    <div class="l1-bar">${segs}</div>
    <div class="l1-labels">${lbls}</div>
  </div>`;
  document.getElementById(id+'_l2').innerHTML='';
  document.getElementById(id+'_l3').innerHTML='';
  setTimeout(()=>{const el=document.getElementById(id+'_l1');if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'})},50);
}

// ── LEVEL 2 ────────────────────────────────────────────────────────────────────
function L2(id,ci,ai,li){
  document.querySelectorAll(`#${id}_l1 .l1-seg.sel-seg`).forEach(e=>e.classList.remove('sel-seg'));
  document.querySelectorAll(`#${id}_l1 .l1-seg[data-li="${li}"]`).forEach(e=>e.classList.add('sel-seg'));
  const vals=id==='bpi'?getBPI(ci,bpiSkill,bpiBloom,ai).vals:id==='ums'?getUMS(ci,ai).vals:getDist(ci,ai,id,id.charCodeAt(0)*500+(id==='g10'?1001:id==='g11'?2002:0));
  const prevVals=ai>0?(id==='bpi'?getBPI(ci,bpiSkill,bpiBloom,ai-1).vals:id==='ums'?getUMS(ci,ai-1).vals:getDist(ci,ai-1,id,id.charCodeAt(0)*500+(id==='g10'?1001:id==='g11'?2002:0))):null;
  if(!vals||!Array.isArray(vals)){return;}
  const total=vals.reduce((a,b)=>a+b,0);
  const prevTotal=prevVals?prevVals.reduce((a,b)=>a+b,0):null;
  let cards='';
  vals.forEach((v,i)=>{
    const pct=Math.round(v/total*100);
    const pp=prevVals?Math.round(prevVals[i]/prevTotal*100):null;
    const delta=pp!==null?pct-pp:null;
    const ds=delta===null?'first assessment':delta>0?`+${delta}% from prev`:delta<0?`${delta}% from prev`:'no change';
    const dc=delta===null?'nc':delta>0?'up':delta<0?'dn':'nc';
    cards+=`<div class="dcard${i===li?' sel-dc':''}" style="background:${M[id].F[i]}18" data-dli="${i}" onclick="L3('${id}',${ci},${ai},${i})">
      <div class="dc-ct" style="color:${M[id].F[i]}">${v}</div>
      <div class="dc-nm" style="color:${M[id].F[i]}">${M[id].N[i]}</div>
      <div class="dc-bw"><div class="dc-bf" style="width:${pct}%;background:${M[id].F[i]}"></div></div>
      <div class="dc-d ${dc}">${ds}</div>
    </div>`;
  });
  document.getElementById(id+'_l2').innerHTML=`<div class="drill-l2">
    <div class="drill-tag">Level 2 — Counts &amp; change from previous assessment</div>
    <div class="drill-title">${CENTRES[ci]} · Assessment ${ai+1} · ${total} learners</div>
    <div class="drill-ctx">Click any card to see the learners in that category</div>
    <div class="delta-grid" style="grid-template-columns:repeat(${Math.min(vals.length,4)},1fr)">${cards}</div>
  </div>`;
  L3(id,ci,ai,li);
}

// ── LEVEL 3 ────────────────────────────────────────────────────────────────────
function L3(id,ci,ai,li){
  document.querySelectorAll(`#${id}_l2 .dcard.sel-dc`).forEach(e=>e.classList.remove('sel-dc'));
  document.querySelectorAll(`#${id}_l2 .dcard[data-dli="${li}"]`).forEach(e=>e.classList.add('sel-dc'));
  const vals=id==='bpi'?getBPI(ci,bpiSkill,bpiBloom,ai).vals:id==='ums'?getUMS(ci,ai).vals:getDist(ci,ai,id,id.charCodeAt(0)*500+(id==='g10'?1001:id==='g11'?2002:0));
  const learners=getLearners(ci);
  const assignments=[];
  let idx=0;
  vals.forEach((count,labelIdx)=>{for(let j=0;j<count&&idx<learners.length;j++,idx++){assignments.push({...learners[idx],labelIdx})}});
  const filtered=assignments.filter(l=>l.labelIdx===li);
  const rows=filtered.map(l=>`<tr>
    <td>${l.name}</td>
    <td><span class="lpill" style="background:${M[id].F[li]};color:${M[id].T[li]}">${M[id].N[li].split('·')[0].trim()}</span></td>
    <td>${l.cefr}</td>
    <td>${l.batch}</td>
  </tr>`).join('');
  document.getElementById(id+'_l3').innerHTML=`<div class="drill-l3">
    <div class="drill-tag">Level 3 — Learners · ${M[id].N[li]}</div>
    <div class="drill-title">${CENTRES[ci]} · Assessment ${ai+1} · ${filtered.length} learner${filtered.length!==1?'s':''} in this category</div>
    <table class="learner-tbl">
      <thead><tr><th>Name</th><th>${M[id].lbl}</th><th>CEFR</th><th>Batch</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="4" style="color:#aaa;font-style:italic;padding:8px">No learners in this category</td></tr>'}</tbody>
    </table>
  </div>`;
}

      svg+=`<path d="${aD}" fill="${col}" fill-opacity="0.06"/>`;

  h+=legend('pattern');
  h+=`<div class="note">TDR = sum(tool_time)/sum(answer_time) · TUI = reflective_uses/total_uses × 100 · Independent = TDR &lt; 0.20</div>`;
  h+=`</div>${drillPanels('pattern')}`;

  // G10 — LOLLIPOP
  h+=`<div class="card">
    <div class="card-tag">Impulsive Decisions — G10</div>
    <div class="card-title">% learners at Fire level — all centres</div>
    <div class="card-sub">Fires when ALL-IN + es_user &lt; 0.40 + dt_ratio &lt; 0.30 and count ≥ 3 · Stem length = % at Fire · Vertical marker = 20% threshold · Click any dot → 3-level drill-down</div>
    <div class="asm-slider"><label>Assessment</label><input type="range" min="0" max="14" value="${lolliAsm}" oninput="lolliAsm=+this.value;document.getElementById('lolliAsmVal').textContent='A'+(+this.value+1);renderLolli()"><span class="asm-val" id="lolliAsmVal">A${lolliAsm+1}</span></div>
    <div id="g10Content">${buildLollipop('g10',lolliAsm)}</div>`;
  h+=legend('g10');
  h+=`</div>${drillPanels('g10')}`;

  // G11 — LOLLIPOP
  h+=`<div class="card">
    <div class="card-tag">Missed Opportunities — G11</div>
    <div class="card-title">% learners at Fire level — all centres</div>
    <div class="card-sub">Fires when SKIP + es_shadow ≥ 0.70 and count ≥ 2 · Stem length = % at Fire · Vertical marker = 20% threshold · Click any dot → 3-level drill-down</div>
    <div id="g11Content">${buildLollipop('g11',lolliAsm)}</div>`;
  h+=legend('g11');
  h+=`</div>${drillPanels('g11')}`;

  document.getElementById('tab2').innerHTML=h;
}

window.renderPattern=function(){const el=document.getElementById('patternContent');if(el)el.innerHTML=stackedBars('pattern',patternAsm)};
window.renderLolli=function(){
  const g10=document.getElementById('g10Content');if(g10)g10.innerHTML=buildLollipop('g10',lolliAsm);
  const g11=document.getElementById('g11Content');if(g11)g11.innerHTML=buildLollipop('g11',lolliAsm);
};

renderTab0();
</script>
