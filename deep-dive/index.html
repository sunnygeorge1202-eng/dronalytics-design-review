<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dronalytics — Admin Deep Dive Analytics</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#F2F4F7;color:#1a1a1a;font-size:13px}
.topbar{background:#1B3A4B;padding:13px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar .brand{color:#fff;font-weight:700;font-size:15px}
.topbar .sub{color:#90b4c8;font-size:12px}
.wrap{max-width:1080px;margin:0 auto;padding:20px 16px 60px}

.filter-bar{background:#fff;border:1px solid #dde3e8;border-radius:10px;padding:12px 18px;margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filter-bar label{font-size:11px;color:#888;font-weight:500}
.filter-bar select{font-size:12px;padding:5px 9px;border:1px solid #dde3e8;border-radius:6px;background:#fff}
.lcount{margin-left:auto;font-size:12px;color:#888}
.lcount strong{color:#1B3A4B}

.tab-bar{display:flex;border-bottom:1px solid #dde3e8;margin-bottom:16px}
.tab-btn{padding:10px 18px;border:none;background:transparent;font-size:13px;color:#888;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab-btn.on{color:#1B3A4B;font-weight:600;border-bottom-color:#1B3A4B}

.card{background:#fff;border:1px solid #dde3e8;border-radius:12px;padding:18px 20px;margin-bottom:14px}
.card-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#aaa;margin-bottom:3px}
.card-title{font-size:13px;font-weight:600;color:#1B3A4B;margin-bottom:3px}
.card-sub{font-size:11px;color:#aaa;margin-bottom:14px;line-height:1.5}
.card-filters{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.card-filters label{font-size:11px;color:#888}
.card-filters select{font-size:11px;padding:4px 7px;border:1px solid #dde3e8;border-radius:5px;background:#fff}
.tgl{display:flex;border:1px solid #ccc;border-radius:6px;overflow:hidden}
.tgl button{padding:4px 12px;font-size:11px;background:#fff;border:none;cursor:pointer;color:#666}
.tgl button.on{background:#1B3A4B;color:#fff;font-weight:600}

/* HEATMAP */
.hm-outer{overflow-x:auto}
.hmt{border-collapse:separate;border-spacing:2px;table-layout:fixed}
.hmt .rlbl{font-size:11px;color:#555;text-align:right;padding-right:8px;white-space:nowrap;vertical-align:middle;font-weight:500;width:108px;min-width:108px}
.hmt .clbl{font-size:9px;color:#aaa;text-align:center;padding-bottom:4px}
.hmc{height:36px;width:50px;min-width:50px;border-radius:5px;cursor:pointer;vertical-align:middle;transition:transform .1s}
.hmc:hover{transform:scale(1.1);position:relative;z-index:3}
.hmc.sel{outline:2.5px solid #1B3A4B;outline-offset:1px;position:relative;z-index:4}
.hmc-na{background:#f0f2f4!important;border:1px dashed #ccc}

/* DRILL PANELS */
.drill-l1{background:#EEF4F8;border:1px solid #c5d8e4;border-radius:12px;padding:16px 18px;margin-bottom:10px}
.drill-l2{background:#F0F8F4;border:1px solid #b2d9c4;border-radius:12px;padding:16px 18px;margin-bottom:10px}
.drill-l3{background:#FFF;border:1px solid #dde3e8;border-radius:12px;padding:16px 18px;margin-bottom:14px}
.drill-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#5a8aa0;margin-bottom:3px}
.drill-title{font-size:13px;font-weight:600;color:#1B3A4B;margin-bottom:10px}
.drill-ctx{font-size:11px;color:#6a8fa0;margin-bottom:12px}
.drill-empty{font-size:12px;color:#aaa;font-style:italic}
.drill-hint{font-size:11px;color:#aaa;font-style:italic;margin-top:8px}

/* L1 — colour-only distribution bar */
.l1-bar{display:flex;height:36px;border-radius:8px;overflow:hidden;cursor:pointer;margin-bottom:6px}
.l1-seg{height:100%;transition:opacity .15s;cursor:pointer;position:relative}
.l1-seg:hover{opacity:.85;outline:2px solid rgba(0,0,0,.2);outline-offset:-2px}
.l1-seg.sel-seg{outline:2.5px solid #1B3A4B;outline-offset:-2px}
.l1-labels{display:flex;margin-top:4px}
.l1-lbl{font-size:10px;color:#888;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:0 2px}

/* L2 — counts + delta */
.delta-grid{display:grid;gap:7px;margin-top:8px}
.dcard{border-radius:8px;padding:10px 12px;cursor:pointer;transition:opacity .15s}
.dcard:hover{opacity:.85;outline:2px solid rgba(0,0,0,.15)}
.dcard.sel-dc{outline:2.5px solid #1B3A4B}
.dc-ct{font-size:22px;font-weight:600;line-height:1}
.dc-nm{font-size:10px;margin-top:2px}
.dc-bw{height:4px;border-radius:2px;margin-top:6px;background:rgba(0,0,0,.08)}
.dc-bf{height:100%;border-radius:2px}
.dc-d{font-size:10px;margin-top:5px;font-weight:500}
.up{color:#0F6E56}.dn{color:#993C1D}.nc{color:#aaa}

/* L3 — learner table */
.learner-table{width:100%;border-collapse:collapse;font-size:12px}
.learner-table th{text-align:left;font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.4px;padding:6px 8px;border-bottom:1px solid #eee}
.learner-table td{padding:7px 8px;border-bottom:1px solid #f5f5f5;color:#333}
.learner-table tr:last-child td{border-bottom:none}
.learner-table tr:hover td{background:#f9fafb}
.label-pill{font-size:10px;font-weight:600;padding:2px 9px;border-radius:99px}
.thin-warn{background:#FAEEDA;color:#633806;border-radius:6px;padding:6px 10px;font-size:11px;margin-bottom:8px}

/* WAFFLE */
.waffle-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.waffle-block{border:1px solid #eee;border-radius:8px;padding:12px}
.waffle-centre{font-size:11px;font-weight:600;color:#1B3A4B;margin-bottom:6px}
.waffle-grid{display:flex;flex-wrap:wrap;gap:3px;cursor:pointer}
.wsq{width:11px;height:11px;border-radius:2px;cursor:pointer;transition:transform .1s}
.wsq:hover{transform:scale(1.3)}
.wsq.sel-wsq{outline:2px solid #1B3A4B;outline-offset:1px}

/* SLOPE CHART */
.slope-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.sl-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#555}
.sl-line{width:18px;height:2px;border-radius:1px}

/* SMALL MULTIPLES DIVERGING */
.sm-div-wrap{display:flex;flex-direction:column;gap:8px}
.sm-div-row{display:flex;align-items:center;gap:10px}
.sm-div-lbl{font-size:11px;color:#555;font-weight:500;min-width:108px;white-space:nowrap}
.sm-div-bar{flex:1;display:flex;height:22px;border-radius:4px;overflow:hidden}
.sm-div-seg{height:100%}

/* DOT PLOT */
.dot-plot-wrap{overflow-x:auto}

/* LOLLIPOP */
.lollipop-wrap{display:flex;flex-direction:column;gap:6px}
.lp-row{display:flex;align-items:center;gap:10px}
.lp-lbl{font-size:11px;color:#555;font-weight:500;min-width:108px}
.lp-track{flex:1;height:20px;background:#f0f2f4;border-radius:3px;position:relative;cursor:pointer}
.lp-stem{height:6px;border-radius:3px;position:absolute;top:7px}
.lp-dot{width:16px;height:16px;border-radius:50%;position:absolute;top:2px;border:2px solid #fff;cursor:pointer;transition:transform .1s}
.lp-dot:hover{transform:scale(1.2)}
.lp-dot.sel-dot{outline:2px solid #1B3A4B;outline-offset:2px}
.lp-threshold{position:absolute;top:0;height:100%;width:2px;background:#999;opacity:.4}

/* STREAM */
.stream-wrap{overflow-x:auto}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-card{border-radius:8px;padding:10px 12px;border:1px solid #eee;cursor:pointer}
.stat-card:hover{border-color:#1B3A4B}
.sc-centre{font-size:11px;font-weight:600;color:#1B3A4B;margin-bottom:5px}
.sc-comp{font-size:10px;color:#888;margin-bottom:5px}
.sc-bar{display:flex;height:14px;border-radius:3px;overflow:hidden;margin-bottom:3px}
.sc-seg{display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;cursor:pointer}

/* RANKED LIST */
.ranked-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f2f4;cursor:pointer}
.ranked-row:last-child{border-bottom:none}
.ranked-row:hover{background:#f9fafb;border-radius:6px;padding-left:6px}
.ranked-lbl{font-size:12px;color:#555;font-weight:500;min-width:120px}
.ranked-pill{font-size:11px;font-weight:600;padding:3px 12px;border-radius:99px}

.leg-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#777}
.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.note{font-size:10px;color:#bbb;font-style:italic;margin-top:8px}
.asm-slider{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.asm-slider label{font-size:11px;color:#888}
.asm-slider input{flex:1;accent-color:#1B3A4B}
.asm-slider span{font-size:11px;font-weight:600;color:#1B3A4B;min-width:28px}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">Dronalytics</span>
  <span class="sub">Admin · Deep Dive Analytics · 15 Assessments</span>
</div>
<div class="wrap">

<div class="filter-bar">
  <label>CEFR level</label>
  <select id="fCEFR" onchange="renderAll()">
    <option value="all">All levels</option>
    <option>A2</option><option>B1</option><option>B2</option>
  </select>
  <div class="lcount">👥 <strong>142</strong> learners in view</div>
</div>

<div class="tab-bar">
  <button class="tab-btn on" onclick="setTab(0)">Mastery &amp; Decisions</button>
  <button class="tab-btn" onclick="setTab(1)">Self-Awareness</button>
  <button class="tab-btn" onclick="setTab(2)">Autonomy &amp; Tool Use</button>
</div>

<div id="tab0"></div>
<div id="tab1" style="display:none"></div>
<div id="tab2" style="display:none"></div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const CENTRES=["GIZ Trivandrum","ILS Kochi","ACL Calicut","YMCA Thrissur","KASE Kozhikode","IHRM Palakkad"];
const CENTRE_N=[58,42,61,38,35,28];
const BLOOMS=["Remember","Understand","Apply","Analyse","Evaluate","Create"];
const SKILLS=["Writing","Reading","Listening","Speaking"];
const N_ASM=15;
const ASMS=Array.from({length:N_ASM},(_,i)=>`A${i+1}`);
const CLRS_C=["#2a78d6","#1baf7a","#eda100","#4a3aa7","#e34948","#e87ba4"];
const FIRST_NAMES=["Anjali","Priya","Rajan","Meera","Joseph","Divya","Anoop","Sreeja","Vishnu","Nithya","Arun","Lakshmi","Kiran","Pooja","Rahul","Deepa","Suresh","Anitha","Praveen","Rekha","Sanjay","Uma","Manoj","Geetha","Vijay"];
const LAST_NAMES=["M.","K.","S.","T.","P.","R.","N.","V.","A.","J.","L.","D.","G.","B.","C."];
const CEFR_OPTS=["A2","B1","B2"];
const BATCHES=["Batch 1","Batch 2","Batch 3"];

// ── COLOURS ────────────────────────────────────────────────────────────────────
const BPI_F=["#D85A30","#EF9F27","#1D9E75","#085041"];
const BPI_T=["#FAECE7","#412402","#E1F5EE","#9FE1CB"];
const BPI_N=["Developing","Emerging","Proficient","Strong"];
const DCI_F=["#712B13","#D85A30","#EF9F27","#5DCAA5","#1D9E75","#085041"];
const DCI_T=["#FAECE7","#FAECE7","#412402","#04342C","#E1F5EE","#9FE1CB"];
const DCI_N=["Fragile","Emerging","Developing","Competent","Strong","Highly Reliable"];
const DCI_ORD=[0,1,2,3,4,5];
const ZONE_F=["#085041","#1D9E75","#EF9F27","#D85A30"];
const ZONE_T=["#9FE1CB","#E1F5EE","#412402","#FAECE7"];
const ZONE_N=["Zone 1 · Ready Performer","Zone 2 · Assisted Performer","Zone 3 · Emerging Independent","Zone 4 · At Risk"];
const DQS_F=["#D85A30","#EF9F27","#1D9E75"];
const DQS_T=["#FAECE7","#412402","#E1F5EE"];
const DQS_N=["Low","Improving","Aligned"];
const CCG_F=["#2a78d6","#1D9E75","#D85A30"];
const CCG_T=["#fff","#E1F5EE","#FAECE7"];
const CCG_N=["Underestimated","Calibrated","Overestimated"];
const PI_F=["#1D9E75","#EF9F27","#D85A30"];
const PI_T=["#E1F5EE","#412402","#FAECE7"];
const PI_N=["Early","Mid","Late"];
const PAT_F=["#085041","#B5D4F4","#EF9F27","#1D9E75","#D85A30","#712B13"];
const PAT_T=["#9FE1CB","#0C447C","#412402","#E1F5EE","#FAECE7","#FAECE7"];
const PAT_N=["Independent","Passive user","Moderate user","Strategic user","Dependent shortcutter","Over-reliant thinker"];
const FLAG_F=["#D85A30","#EF9F27","#E8EFF3"];
const FLAG_T=["#FAECE7","#412402","#555"];
const FLAG_N_G10=["Fires (≥3)","Watch (1–2)","None"];
const FLAG_N_G11=["Fires (≥2)","Watch (1)","None"];
const CI_F=["#D85A30","#EF9F27","#1D9E75"];
const CI_T=["#FAECE7","#412402","#E1F5EE"];
const CI_N=["Inconsistent","Moderately stable","Stable"];
const UMS_F=["#D85A30","#EF9F27","#1D9E75"];
const UMS_T=["#FAECE7","#412402","#E1F5EE"];
const UMS_N=["Struggling","Improving","Strong"];

// ── SEEDED RANDOM ──────────────────────────────────────────────────────────────
function sr(seed){let s=Math.abs(Math.round(seed))|1;return()=>{s=(s*9301+49297)%233280;return s/233280}}

// ── LEARNER ROSTER ─────────────────────────────────────────────────────────────
function getLearners(ci){
  const r=sr(ci*9999);
  const n=CENTRE_N[ci];
  return Array.from({length:n},(_,i)=>{
    const r2=sr(ci*1000+i*7);
    return{
      id:i,
      name:FIRST_NAMES[Math.floor(r2()*FIRST_NAMES.length)]+' '+LAST_NAMES[Math.floor(r2()*LAST_NAMES.length)],
      cefr:CEFR_OPTS[Math.floor(r2()*3)],
      batch:BATCHES[Math.floor(r2()*3)]
    };
  });
}

// ── DATA GENERATORS ────────────────────────────────────────────────────────────
function getDistCounts(ci,ai,seed,n,labels,prog=0.02){
  const r=sr(seed+ci*1000+ai*100);
  const nL=labels.length;
  let vals=Array.from({length:nL},(_,i)=>Math.max(0.02,r()+(i>nL/2?prog*ai:-prog*ai*0.5)));
  const sum=vals.reduce((a,b)=>a+b,0);
  return vals.map(v=>Math.max(1,Math.round(v/sum*n)));
}

function getBPI(ci,si,bi,ai){
  const seed=ci*10000+si*1000+bi*100+ai;
  const r=sr(seed);
  const thin=r()<(bi>=4?0.35:0.08);
  const n=thin?3:Math.round(CENTRE_N[ci]*0.8);
  const vals=getDistCounts(ci,ai,seed+1,n,BPI_N,0.025);
  return{vals,n,thin};
}
function getDCI(ci,ai){return getDistCounts(ci,ai,2000,CENTRE_N[ci],DCI_N,0.018)}
function getZone(ci,ai){
  const r=getDistCounts(ci,ai,3000,CENTRE_N[ci],ZONE_N,-0.02);
  return[r[3],r[2],r[1],r[0]]; // reverse: Z1 best grows, Z4 shrinks
}
function getDQS(ci,ai){return getDistCounts(ci,ai,4000,CENTRE_N[ci],DQS_N,0.03)}
function getCCG(ci,ai){return getDistCounts(ci,ai,5000,CENTRE_N[ci],CCG_N,-0.02)}
function getPI(ci,ai){return getDistCounts(ci,ai,6000,CENTRE_N[ci],PI_N,-0.03)}
function getPattern(ci,ai){return getDistCounts(ci,ai,7000,CENTRE_N[ci],PAT_N,0.01)}
function getFlag(ci,ai,seed){return getDistCounts(ci,ai,seed,CENTRE_N[ci],["Fire","Watch","None"],-0.03)}
function getCITime(ci,ai){if(ai<2)return null;return getDistCounts(ci,ai,9000,CENTRE_N[ci],CI_N,0.04)}
function getUMS(ci,ai){
  const r=sr(ci*800+ai*23);
  const comp=Math.max(3,Math.round((0.32+r()*0.12)*CENTRE_N[ci]));
  const vals=getDistCounts(ci,ai,10000,comp,UMS_N,0.03);
  return{comp,vals,na:CENTRE_N[ci]-comp};
}

// ── ASSIGN LEARNER LABELS ──────────────────────────────────────────────────────
function assignLabels(ci,ai,dataSeed,labels,dataFn){
  const learners=getLearners(ci);
  const counts=dataFn(ci,ai);
  const total=counts.reduce((a,b)=>a+b,0);
  const assigned=[];
  let li=0,rem=counts[0];
  learners.forEach((l,i)=>{
    while(rem<=0&&li<labels.length-1){li++;rem=counts[li]}
    assigned.push({...l,label:labels[li],labelIdx:li,fill:window['_fills_'+dataSeed]?.[li]||'#aaa',txt:window['_txts_'+dataSeed]?.[li]||'#fff'});
    rem--;
  });
  return assigned;
}

// ── BPI INTENSITY ──────────────────────────────────────────────────────────────
function bpiIntensity(li,pct){
  const stops=[["#FAECE7","#F09070","#D85A30","#993C1D","#712B13"],["#FAEEDA","#FAC775","#EF9F27","#BA7517","#854F0B"],["#E1F5EE","#9FE1CB","#5DCAA5","#1D9E75","#0F6E56"],["#9FE1CB","#5DCAA5","#1D9E75","#0F6E56","#085041"]];
  const txts=[["#712B13","#712B13","#FAECE7","#FAECE7","#FAECE7"],["#633806","#633806","#412402","#412402","#FAEEDA"],["#085041","#085041","#04342C","#E1F5EE","#E1F5EE"],["#04342C","#04342C","#E1F5EE","#E1F5EE","#9FE1CB"]];
  const i=pct<40?0:pct<55?1:pct<70?2:pct<85?3:4;
  return{bg:stops[li][i],txt:txts[li][i]};
}

// ── HEATMAP BUILDER ────────────────────────────────────────────────────────────
function buildHeatmap(cellFn,drillFn,id){
  let h=`<div class="hm-outer"><table class="hmt"><colgroup><col style="width:108px">`;
  ASMS.forEach(()=>h+=`<col style="width:50px">`);
  h+=`</colgroup><tr><td></td>`;
  ASMS.forEach(a=>h+=`<td class="clbl">${a}</td>`);
  h+=`</tr>`;
  CENTRES.forEach((c,ci)=>{
    h+=`<tr><td class="rlbl">${c}</td>`;
    ASMS.forEach((_,ai)=>{
      const cell=cellFn(ci,ai);
      if(!cell){h+=`<td class="hmc hmc-na" title="Not available"></td>`;return}
      h+=`<td class="hmc" style="background:${cell.bg}" data-ci="${ci}" data-ai="${ai}" onclick="L1('${id}',${ci},${ai})"></td>`;
    });
    h+=`</tr>`;
  });
  h+=`</table></div>`;
  return h;
}

// ── LEGEND ─────────────────────────────────────────────────────────────────────
function legend(items){
  return `<div class="leg-row">${items.map(([bg,label])=>`<div class="leg"><div class="leg-sq" style="background:${bg}"></div>${label}</div>`).join('')}</div>`;
}

// ── DRILL STATE ────────────────────────────────────────────────────────────────
const DS={id:null,ci:null,ai:null,li:null};

// ── LEVEL 1 — colour-only distribution ────────────────────────────────────────
function L1(id,ci,ai){
  document.querySelectorAll('.hmc.sel,.wsq.sel-wsq,.lp-dot.sel-dot').forEach(e=>e.classList.remove('sel','sel-wsq','sel-dot'));
  const el=document.querySelector(`[data-ci="${ci}"][data-ai="${ai}"]`);
  if(el) el.classList.add('sel');
  DS.id=id;DS.ci=ci;DS.ai=ai;DS.li=null;
  const cfg=METRIC_CFG[id];
  const vals=cfg.dataFn(ci,ai);
  if(!vals){renderL1Empty(id);return}
  const arr=Array.isArray(vals)?vals:vals.vals;
  const total=arr.reduce((a,b)=>a+b,0);
  let segs='',lbls='';
  arr.forEach((v,i)=>{
    const pct=Math.round(v/total*100);
    if(pct<1)return;
    segs+=`<div class="l1-seg" style="width:${pct}%;background:${cfg.fills[i]}" data-li="${i}" onclick="L2('${id}',${ci},${ai},${i})" title="${cfg.names[i]}"></div>`;
    lbls+=`<div class="l1-lbl" style="width:${pct}%;color:${cfg.fills[i]}">${pct>=10?cfg.names[i]:''}</div>`;
  });
  const thin=cfg.thinFn?cfg.thinFn(ci,ai):false;
  document.getElementById(id+'_l1').innerHTML=`<div class="drill-l1">
    <div class="drill-tag">Level 1 — Label distribution</div>
    <div class="drill-title">${CENTRES[ci]} · Assessment ${ai+1}</div>
    ${thin?'<div class="thin-warn">Thin data — fewer than 5 students. Interpret with caution.</div>':''}
    <div class="drill-ctx">Colour proportion only — click a segment to see counts and change from previous assessment</div>
    <div class="l1-bar">${segs}</div>
    <div class="l1-labels">${lbls}</div>
  </div>`;
  document.getElementById(id+'_l2').innerHTML='';
  document.getElementById(id+'_l3').innerHTML='';
}

function renderL1Empty(id){

// ── LEVEL 2 — counts + delta ───────────────────────────────────────────────────
function L2(id,ci,ai,li){
  document.querySelectorAll('.l1-seg.sel-seg').forEach(e=>e.classList.remove('sel-seg'));
  document.querySelectorAll(`.l1-seg[data-li="${li}"]`).forEach(e=>e.classList.add('sel-seg'));
  DS.li=li;
  const cfg=METRIC_CFG[id];
  const vals=cfg.dataFn(ci,ai);
  const arr=Array.isArray(vals)?vals:vals.vals;
  const total=arr.reduce((a,b)=>a+b,0);
  const prevRaw=ai>0?cfg.dataFn(ci,ai-1):null;
  const prevArr=prevRaw?(Array.isArray(prevRaw)?prevRaw:prevRaw.vals):null;
  const prevTotal=prevArr?prevArr.reduce((a,b)=>a+b,0):null;
  let cards='';
  arr.forEach((v,i)=>{
    const pct=Math.round(v/total*100);
    const pp=prevArr?Math.round(prevArr[i]/prevTotal*100):null;
    const delta=pp!==null?pct-pp:null;
    const ds=delta===null?'first assessment':delta>0?`+${delta}% from prev`:delta<0?`${delta}% from prev`:'no change';
    const dc=delta===null?'nc':delta>0?'up':delta<0?'dn':'nc';
    cards+=`<div class="dcard${i===li?' sel-dc':''}" style="background:${cfg.fills[i]}22;cursor:pointer" data-dli="${i}" onclick="L3('${id}',${ci},${ai},${i})">
      <div class="dc-ct" style="color:${cfg.fills[i]}">${v}</div>
      <div class="dc-nm" style="color:${cfg.fills[i]}">${cfg.names[i]}</div>
      <div class="dc-bw"><div class="dc-bf" style="width:${pct}%;background:${cfg.fills[i]}"></div></div>
      <div class="dc-d ${dc}">${ds}</div>
    </div>`;
  });
  document.getElementById(id+'_l2').innerHTML=`<div class="drill-l2">
    <div class="drill-tag">Level 2 — Counts &amp; change</div>
    <div class="drill-title">${CENTRES[ci]} · Assessment ${ai+1} · ${total} learners</div>
    <div class="drill-ctx">Click any card to see learners in that category</div>
    <div class="delta-grid" style="grid-template-columns:repeat(${Math.min(arr.length,4)},1fr)">${cards}</div>
  </div>`;
  L3(id,ci,ai,li);
}

// ── LEVEL 3 — learner list ─────────────────────────────────────────────────────
function L3(id,ci,ai,li){
  document.querySelectorAll('.dcard.sel-dc').forEach(e=>e.classList.remove('sel-dc'));
  document.querySelectorAll(`.dcard[data-dli="${li}"]`).forEach(e=>e.classList.add('sel-dc'));
  DS.li=li;
  const cfg=METRIC_CFG[id];
  const learners=getLearners(ci);
  const vals=cfg.dataFn(ci,ai);
  const arr=Array.isArray(vals)?vals:vals.vals;
  // Assign learners to labels proportionally using seeded order
  const assignments=[];
  let idx=0;
  arr.forEach((count,labelIdx)=>{
    for(let j=0;j<count&&idx<learners.length;j++,idx++){
      assignments.push({...learners[idx],labelIdx});
    }
  });
  const filtered=assignments.filter(l=>l.labelIdx===li);
  let rows=filtered.map(l=>`<tr>
    <td>${l.name}</td>
    <td><span class="label-pill" style="background:${cfg.fills[li]};color:${cfg.txts[li]}">${cfg.names[li]}</span></td>
    <td>${l.cefr}</td>
    <td>${l.batch}</td>
  </tr>`).join('');
  document.getElementById(id+'_l3').innerHTML=`<div class="drill-l3">
    <div class="drill-tag">Level 3 — Learners · ${cfg.names[li]}</div>
    <div class="drill-title">${CENTRES[ci]} · Assessment ${ai+1} · ${filtered.length} learners in this category</div>
    <table class="learner-table">
      <thead><tr><th>Name</th><th>${cfg.metricLabel}</th><th>CEFR</th><th>Batch</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderWaffle(elId,ai){

    h+=`<div class="waffle-block">

      <div class="waffle-grid">

    <div class="card-tag">Performance Consistency — CI Time</div>
    <div class="card-title">CI Time label — all centres × assessments 3–15</div>
    <div class="card-sub">CI Time = (1 − pstdev / mean) × 100 · Requires ≥ 3 assessments · A1–A2 always N/A · Click any cell → drill-down</div>`;
  h+=buildHeatmap((ci,ai)=>{
    const d=getCITime(ci,ai);
    if(!d)return null;
    const total=d.vals.reduce((a,b)=>a+b,0);
    const di=d.vals.indexOf(Math.max(...d.vals));
    const pct=Math.round(d.vals[di]/total*100);
    const intens=pct<40?'88':pct<65?'bb':'ff';
    return{bg:CI_F[di]+intens};
  },null,'citime');
  h+=legend(CI_N.map((n,i)=>[CI_F[i],n]));
  h+=`</div>${drillPanels('citime')}`;

  document.getElementById('tab1').innerHTML=h;
  renderUMSCards(umsAsm);
}

function renderUMSCards(ai){
  const el=document.getElementById('umsCards');
  if(!el)return;
  let h='';
  CENTRES.forEach((c,ci)=>{
    const {comp,vals,na}=getUMS(ci,ai);
    const total=vals.reduce((a,b)=>a+b,0);
    h+=`<div class="stat-card">
      <div class="sc-centre">${c}</div>
      <div class="sc-comp">${comp} of ${CENTRE_N[ci]} learners · unc ≥ 0.60</div>
      <div class="sc-bar">
        ${vals.map((v,i)=>{const pct=Math.round(v/total*100);return pct>0?`<div class="sc-seg" style="width:${pct}%;background:${UMS_F[i]}" onclick="umsClick(${ci},${ai},${i})" title="${UMS_N[i]}"></div>`:''}).join('')}
      </div>
      <div style="font-size:10px;color:#aaa;margin-top:3px">${na} learners N/A</div>
    </div>`;
  });
  el.innerHTML=h;
}

window.umsClick=function(ci,ai,li){
  L1('ums',ci,ai);
  setTimeout(()=>L2('ums',ci,ai,li),50);
};

    <div class="card-filters">

  // G10 — LOLLIPOP
  h+=`<div class="card">

    <div class="card-title">% learners at Fire level — all centres</div>

    <div class="asm-slider">
      <label>Assessment</label>

  h+=legend([["#D85A30","Fires (≥3)"],["#EF9F27","Watch (1–2)"],["#E8EFF3","None"]]);

  // G11 — LOLLIPOP
  h+=`<div class="card">

  document.getElementById('tab2').innerHTML=h;

function renderStream(elId,ci){
  const el=document.getElementById(elId);
  if(!el)return;
  const W=720,H=180,PL=0,PR=0,PT=10,PB=24,gW=W-PL-PR,gH=H-PT-PB,xStep=gW/14;
  const allVals=ASMS.map((_,ai)=>{
    const v=getPattern(ci,ai);
    const t=v.reduce((a,b)=>a+b,0);
    return v.map(x=>x/t);
  });
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">`;
  // stacked areas
  const cumulative=ASMS.map((_,ai)=>{
    let cum=0;
    return PAT_N.map((_,li)=>{cum+=allVals[ai][li];return cum});
  });
  PAT_N.forEach((_,li)=>{
    const points=ASMS.map((_,ai)=>{
      const x=PL+ai*xStep;
      const yTop=PT+gH-(cumulative[ai][li])*gH;
      const yBot=li===0?PT+gH:PT+gH-(cumulative[ai][li-1])*gH;
      return{x,yTop,yBot};
    });
    const pathD=`M${points[0].x},${points[0].yBot} `+
      points.map(p=>`L${p.x},${p.yTop}`).join(' ')+
      ` L${points[points.length-1].x},${points[points.length-1].yBot} `+
      [...points].reverse().map(p=>`L${p.x},${p.yBot}`).join(' ')+' Z';
    const ai_mid=7;
    svg+=`<path d="${pathD}" fill="${PAT_F[li]}" opacity=".85" style="cursor:pointer" onclick="L1('pattern',${ci},${ai_mid})"/>`;
  });
  for(let ai=0;ai<15;ai++){
    const x=PL+ai*xStep;
    svg+=`<text x="${x}" y="${PT+gH+14}" text-anchor="middle" font-size="8" fill="#bbb" font-family="sans-serif">A${ai+1}</text>`;
    svg+=`<line x1="${x}" y1="${PT}" x2="${x}" y2="${PT+gH}" stroke="rgba(255,255,255,.3)" stroke-width="0.5"/>`;
  }
  svg+=`</svg>`;
  el.innerHTML=svg;
}

function renderLollipop(elId,ai,metricId){
  const el=document.getElementById(elId);
  if(!el)return;
  const dataFn=metricId==='g10'?(ci,ai)=>getFlag(ci,ai,1001):(ci,ai)=>getFlag(ci,ai,2002);
  const flagNames=metricId==='g10'?FLAG_N_G10:FLAG_N_G11;
  let h='';
  CENTRES.forEach((c,ci)=>{
    const vals=dataFn(ci,ai);
    const total=vals.reduce((a,b)=>a+b,0);
    const firePct=Math.round(vals[0]/total*100);
    const watchPct=Math.round(vals[1]/total*100);
    const dom=firePct>20?0:watchPct>40?1:2;
    const col=FLAG_F[dom];
    h+=`<div class="lp-row">
      <div class="lp-lbl">${c}</div>
      <div class="lp-track" onclick="L1('${metricId}',${ci},${ai})">
        <div class="lp-stem" style="width:${firePct}%;background:${FLAG_F[0]}"></div>
        <div class="lp-dot" style="left:calc(${firePct}% - 8px);background:${col}" title="${c} · A${ai+1} · Fire: ${firePct}%"></div>
        <div class="lp-threshold" style="left:20%"></div>
      </div>
    </div>`;
  });
  el.innerHTML=h;
}

setTab(0);
