<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dronalytics — Admin Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#E8EDE8;display:flex;min-height:100vh;color:#1a1a1a}

/* ── SIDEBAR ── */
.sidebar{width:210px;min-height:100vh;background:#0D1321;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100%}
.sidebar-brand{padding:28px 22px 20px}
.sidebar-brand .logo{font-size:18px;font-weight:700;color:#C9A84C;letter-spacing:.3px}
.sidebar-brand .role{font-size:10px;font-weight:600;color:#4a6080;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.nav{flex:1;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 22px;font-size:13px;color:#6a8aaa;cursor:pointer;transition:all .15s;border-left:3px solid transparent;text-decoration:none}
.nav-item:hover{color:#C9A84C;background:rgba(201,168,76,.06)}
.nav-item.active{color:#C9A84C;background:rgba(201,168,76,.10);border-left-color:#C9A84C;font-weight:600}
.nav-icon{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-item.active .nav-icon{opacity:1}
.sidebar-user{padding:16px 22px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.user-avatar{width:34px;height:34px;border-radius:50%;background:#C9A84C;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#0D1321;flex-shrink:0}
.user-name{font-size:12px;font-weight:600;color:#c8d4e0}
.user-role{font-size:10px;color:#4a6080;margin-top:1px}

/* ── MAIN ── */
.main{margin-left:210px;flex:1;padding:40px 56px 60px;min-height:100vh}
.welcome-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:44px}
.welcome-text{font-size:26px;font-weight:300;color:#1B3A4B}
.welcome-text strong{font-weight:700}
.date-text{font-size:12px;color:#999}

/* ── PLAYING CARDS ── */
.cards-row{display:flex;gap:48px;justify-content:center;margin-bottom:52px}
.card-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;cursor:pointer;text-decoration:none}
.playing-card{width:196px;height:284px;border-radius:16px;position:relative;transition:transform .28s cubic-bezier(.34,1.56,.64,1),box-shadow .28s ease;box-shadow:0 10px 40px rgba(13,19,33,.30),0 2px 8px rgba(13,19,33,.15);overflow:hidden}
.playing-card:hover{box-shadow:0 28px 56px rgba(13,19,33,.40),0 4px 12px rgba(13,19,33,.20)}
.card-wrap:nth-child(1) .playing-card:hover{transform:translateY(-14px) rotate(1.5deg)}
.card-wrap:nth-child(2) .playing-card:hover{transform:translateY(-14px) rotate(-1.5deg)}

/* Assessments card */
.card-a{background:#0D1321}
/* Analytics card */
.card-b{background:#0A2218}

.card-label{font-size:13px;font-weight:600;color:#3a4a5a;letter-spacing:.3px}
.card-sublabel{font-size:11px;color:#999;margin-top:1px}

/* ── MOTD CARD FACE ── */
.motd-card{background:#FDFBF5;border-radius:16px;box-shadow:0 8px 40px rgba(13,19,33,.18),0 2px 8px rgba(13,19,33,.10);padding:0;overflow:hidden;position:relative;border:1px solid rgba(201,168,76,.25)}

/* card face border inset */
.motd-card::before{content:'';position:absolute;inset:10px;border:1px solid rgba(201,168,76,.20);border-radius:10px;pointer-events:none;z-index:1}

.motd-inner{padding:22px 28px 20px;position:relative;z-index:2}

/* corner markers */
.motd-corner{position:absolute;z-index:3;display:flex;flex-direction:column;align-items:center;line-height:1;gap:1px}
.motd-corner.tl{top:16px;left:20px}
.motd-corner.br{bottom:16px;right:20px;transform:rotate(180deg)}
.motd-corner .rank{font-size:13px;font-weight:800;color:#C9A84C;font-family:Georgia,serif}
.motd-corner .suit{font-size:11px;color:#C9A84C}

/* eyebrow */
.motd-eyebrow{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#C9A84C;margin-bottom:6px}

/* central illustration */
.motd-illustration{display:flex;justify-content:center;margin:8px 0 14px}

/* metric name */
.motd-metric-name{text-align:center;font-size:17px;font-weight:700;color:#1B3A4B;margin-bottom:18px;line-height:1.3}

/* divider */
.motd-divider{height:1px;background:rgba(201,168,76,.25);margin:0 -28px 18px}

/* four columns */
.motd-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px}
.motd-col-head{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#C9A84C;margin-bottom:5px}
.motd-col-text{font-size:11.5px;color:#555;line-height:1.6}
.motd-col-text em{color:#1B3A4B;font-style:normal;font-weight:600}

/* progress */
.motd-footer{display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(201,168,76,.15);padding-top:14px}
.motd-dots{display:flex;gap:5px}
.motd-dot{width:7px;height:7px;border-radius:50%;background:#e8e0cc}
.motd-dot.on{background:#C9A84C}
.motd-prog-label{font-size:10px;color:#bbb;font-style:italic}
.motd-badge{font-size:10px;font-weight:700;background:#0D1321;color:#C9A84C;padding:3px 11px;border-radius:99px;letter-spacing:.4px}
</style>
</head>
<body>

<!-- MAIN -->
<main class="main">

  <div class="welcome-row">
    <div class="welcome-text">Welcome back, <strong>Rohit</strong></div>
    <div class="date-text" id="dateText"></div>
  </div>

  <!-- NAVIGATION CARDS -->
  <div class="cards-row">

    <!-- Assessments -->
    <div class="card-wrap" href="#">
      <div class="playing-card card-a">
        <svg width="196" height="284" viewBox="0 0 196 284" style="position:absolute;inset:0">
          <defs>
            <pattern id="pa" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
              <path d="M9 0 L18 9 L9 18 L0 9 Z" fill="none" stroke="rgba(201,168,76,0.15)" stroke-width="0.7"/>
            </pattern>
          </defs>
          <rect width="196" height="284" fill="url(#pa)"/>
          <rect x="9" y="9" width="178" height="266" rx="10" fill="none" stroke="rgba(201,168,76,0.35)" stroke-width="1.2"/>
          <rect x="15" y="15" width="166" height="254" rx="8" fill="none" stroke="rgba(201,168,76,0.18)" stroke-width="0.7"/>
          <!-- emblem -->
          <g transform="translate(98,142)">
            <path d="M0,-36 L21,-12 L13,22 L-13,22 L-21,-12 Z" fill="none" stroke="rgba(201,168,76,0.5)" stroke-width="1.2"/>
            <path d="M0,-22 L13,-7 L8,14 L-8,14 L-13,-7 Z" fill="rgba(201,168,76,0.10)" stroke="rgba(201,168,76,0.35)" stroke-width="0.8"/>

          <!-- corner pips -->
          <text x="20" y="35" font-family="Georgia,serif" font-size="15" fill="rgba(201,168,76,0.75)" font-weight="bold">A</text>

          <text x="176" y="258" font-family="Georgia,serif" font-size="15" fill="rgba(201,168,76,0.75)" font-weight="bold" transform="rotate(180,176,251)">A</text>
          <text x="176" y="270" font-family="Georgia,serif" font-size="12" fill="rgba(201,168,76,0.55)" transform="rotate(180,176,263)">♠</text>

    <!-- Analytics -->

          <rect x="9" y="9" width="178" height="266" rx="10" fill="none" stroke="rgba(201,168,76,0.35)" stroke-width="1.2"/>
          <rect x="15" y="15" width="166" height="254" rx="8" fill="none" stroke="rgba(201,168,76,0.18)" stroke-width="0.7"/>
          <!-- compass emblem -->
          <g transform="translate(98,142)">
            <circle r="36" fill="none" stroke="rgba(201,168,76,0.38)" stroke-width="1"/>
            <circle r="24" fill="none" stroke="rgba(201,168,76,0.22)" stroke-width="0.7"/>
            <line x1="0" y1="-36" x2="0" y2="36" stroke="rgba(201,168,76,0.15)" stroke-width="0.6"/>
            <line x1="-36" y1="0" x2="36" y2="0" stroke="rgba(201,168,76,0.15)" stroke-width="0.6"/>
            <path d="M0,-24 L6,8 L-6,8 Z" fill="rgba(201,168,76,0.22)" stroke="rgba(201,168,76,0.5)" stroke-width="0.8"/>

          </g>
          <text x="20" y="35" font-family="Georgia,serif" font-size="15" fill="rgba(201,168,76,0.75)" font-weight="bold">A</text>
          <text x="20" y="50" font-family="Georgia,serif" font-size="12" fill="rgba(201,168,76,0.55)">♦</text>
          <text x="176" y="258" font-family="Georgia,serif" font-size="15" fill="rgba(201,168,76,0.75)" font-weight="bold" transform="rotate(180,176,251)">A</text>
          <text x="176" y="270" font-family="Georgia,serif" font-size="12" fill="rgba(201,168,76,0.55)" transform="rotate(180,176,263)">♦</text>

      </div>
      <div class="card-label">Analytics</div>
      <div class="card-sublabel">View results</div>

  </div>

  <!-- METRIC OF THE DAY — card face -->
  <div class="motd-card" id="motdCard"></div>

</main>

<script>
document.getElementById('dateText').textContent = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

// ── METRIC DATA ───────────────────────────────────────────────────────────────
const METRICS = [
  {
    id:'DCI', rank:'D', suit:'♠', abbr:'DCI',
    name:'Drona Competency Index',
    icon:`<svg width="64" height="64" viewBox="0 0 64 64" fill="none">
      <rect x="8" y="44" width="8" height="14" rx="2" fill="#D85A30" opacity=".7"/>
      <rect x="20" y="34" width="8" height="24" rx="2" fill="#EF9F27" opacity=".8"/>
      <rect x="32" y="24" width="8" height="34" rx="2" fill="#5DCAA5" opacity=".85"/>
      <rect x="44" y="14" width="8" height="44" rx="2" fill="#085041"/>
      <line x1="8" y1="42" x2="56" y2="12" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="4 3"/>
    </svg>`,
    what:'A readiness label that summarises a learner\'s overall capability — combining proficiency across all Bloom levels, decision quality, cognitive autonomy, and reliability of the estimate.',
    plain:'Think of it as the learner\'s <em>readiness label</em>. A learner labelled Competent or Strong performs consistently, independently, and across all thinking levels. A Fragile or Emerging label means the pattern hasn\'t stabilised yet.',
    admin:'Watch how the label changes across assessments — Emerging → Developing → Competent is the trajectory that matters. A centre where most learners stay at Developing or below across multiple assessments needs pedagogical review, not just more content.',
    example:'In the DCI heatmap, one centre\'s row stays amber (Developing) through Assessment 7 then shifts to teal (Competent). Clicking Assessment 12 shows: 18 Competent, 9 Strong, 3 Fragile. Clicking Fragile opens the learner table — all three are from the same batch, signalling a batch-specific issue.'
  },
  {
    id:'BPI', rank:'B', suit:'♥', abbr:'BPI',
    name:'Bloom Proficiency Index',
    icon:`<svg width="64" height="64" viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="22" fill="none" stroke="#C9A84C" stroke-width="1" opacity=".3"/>
      <path d="M32 10 L32 32" stroke="#085041" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M32 32 L46 20" stroke="#1D9E75" stroke-width="2" stroke-linecap="round"/>
      <path d="M32 32 L50 36" stroke="#EF9F27" stroke-width="2" stroke-linecap="round"/>
      <path d="M32 32 L40 50" stroke="#D85A30" stroke-width="2" stroke-linecap="round"/>
      <path d="M32 32 L18 48" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" opacity=".6"/>
      <path d="M32 32 L14 28" stroke="#EF9F27" stroke-width="1.5" stroke-linecap="round" opacity=".6"/>
      <circle cx="32" cy="32" r="4" fill="#C9A84C"/>
      <text x="31" y="8" text-anchor="middle" font-size="7" fill="#085041" font-family="sans-serif">Create</text>
      <text x="50" y="19" text-anchor="start" font-size="6" fill="#1D9E75" font-family="sans-serif">Eval</text>
      <text x="52" y="38" text-anchor="start" font-size="6" fill="#EF9F27" font-family="sans-serif">Analyse</text>
      <text x="42" y="54" text-anchor="middle" font-size="6" fill="#D85A30" font-family="sans-serif">Apply</text>
    </svg>`,
    what:'Measures how well a learner performs across each of the six Bloom levels — from basic recall (Remember) through to complex thinking (Create). Available per skill (Reading, Listening, Writing, Speaking).',
    plain:'BPI tells you <em>where in the thinking hierarchy</em> a learner is strong and where they struggle. A learner who scores well at Remember but poorly at Analyse is recalling facts but not yet using them — a very different problem than being weak at all levels.',
    admin:'In the deep dive, filter the BPI heatmap by Skill and Bloom level. If one centre shows consistent Developing labels at Evaluate and Create while another shows Proficient, the teaching approach at those two centres is producing different thinking depths.',
    example:'Filter to Listening + Evaluate. One centre\'s cells are consistently dark red (Developing) across 15 assessments while another shows teal (Proficient) from Assessment 5. Clicking Assessment 8 in the stronger centre shows 14 Proficient, 6 Strong, 2 Emerging — drill to the learner table for targeted follow-up.'
  },
  {
    id:'CCG', rank:'C', suit:'♦', abbr:'CCG',
    name:'Confidence Calibration Gap',
    icon:`<svg width="64" height="64" viewBox="0 0 64 64" fill="none">
      <line x1="32" y1="12" x2="32" y2="52" stroke="#ccc" stroke-width="1.5"/>
      <rect x="14" y="28" width="16" height="10" rx="3" fill="#2a78d6" opacity=".8"/>
      <rect x="34" y="28" width="16" height="10" rx="3" fill="#D85A30" opacity=".8"/>
      <text x="22" y="25" text-anchor="middle" font-size="7" fill="#2a78d6" font-family="sans-serif">Actual</text>
      <text x="42" y="25" text-anchor="middle" font-size="7" fill="#D85A30" font-family="sans-serif">Perceived</text>
      <path d="M14 33 L34 33" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="3 2"/>
      <circle cx="32" cy="33" r="3" fill="#C9A84C"/>
      <text x="32" y="52" text-anchor="middle" font-size="7" fill="#888" font-family="sans-serif">CCG = gap</text>
    </svg>`,
    what:'The gap between how confident a learner says they are before answering and how well they actually perform. Label reflects the size and direction of that gap — Calibrated, Mild gap, or Large gap, with direction (Overestimated or Underestimated).',
    plain:'A calibrated learner <em>knows what they know and what they don\'t</em>. Overestimated means they thought they did well but didn\'t. Underestimated means they doubted themselves but actually performed fine. Both are different problems requiring different responses.',
    admin:'In the CCG dot plot, watch each centre\'s trail across 15 assessments. A trail rising toward Calibrated means learners are developing self-awareness. A trail stuck at Overestimated across multiple assessments signals a need for structured reflection after each assessment.',
    example:'The dot plot shows one centre\'s dots clustered near Overestimated through Assessments 1–6, then rising toward Calibrated by Assessment 10. Clicking Assessment 4\'s dot opens the distribution bar — mostly Overestimated. The Level 3 learner table shows which learners to prioritise for feedback conversations.'
  },
  {
    id:'DQS', rank:'D', suit:'♣', abbr:'DQS',
    name:'Decision Quality Score',
    icon:`<svg width="64" height="64" viewBox="0 0 64 64" fill="none">
      <rect x="10" y="26" width="14" height="18" rx="3" fill="#D85A30" opacity=".85"/>
      <rect x="26" y="20" width="14" height="24" rx="3" fill="#EF9F27" opacity=".85"/>
      <rect x="42" y="14" width="12" height="30" rx="3" fill="#1D9E75" opacity=".9"/>
      <text x="17" y="23" text-anchor="middle" font-size="7" fill="#D85A30" font-family="sans-serif">Low</text>
      <text x="33" y="17" text-anchor="middle" font-size="7" fill="#EF9F27" font-family="sans-serif">Impr.</text>
      <text x="48" y="11" text-anchor="middle" font-size="7" fill="#1D9E75" font-family="sans-serif">Aligned</text>
      <line x1="10" y1="48" x2="56" y2="48" stroke="#C9A84C" stroke-width="1" opacity=".5"/>
    </svg>`,
    what:'Measures how well a learner\'s choices — All-In, Show, or Skip — matched their actual performance. A high DQS (Aligned) means their commitment decisions were well-calibrated to their ability.',
    plain:'In every question, learners choose how much to commit. <em>DQS rewards good judgement</em> — choosing All-In when strong and Skip when genuinely unsure. Choosing All-In when weak or Skipping when capable both reduce the score.',
    admin:'Compare the DQS stacked bars across all centres at the same assessment. A centre leaning heavily to Low means learners are committing incorrectly — either overcommitting on weak answers or undercommitting on strong ones. This is a strategy issue, not a knowledge gap.',
    example:'At Assessment 5, the DQS stacked bars show one centre leaning heavily left (Low), another leaning right (Aligned). Drilling into the Low centre reveals many learners also labelled Proficient in BPI — they know the content but make poor commitment decisions. Strategy coaching, not content review, is the intervention.'
  },
  {
    id:'Zone', rank:'Z', suit:'♠', abbr:'Zone',
    name:'Capability Zone',
    icon:`<svg width="64" height="64" viewBox="0 0 64 64" fill="none">
      <rect x="10" y="10" width="20" height="20" rx="4" fill="#085041" opacity=".9"/>
      <rect x="34" y="10" width="20" height="20" rx="4" fill="#1D9E75" opacity=".85"/>
      <rect x="10" y="34" width="20" height="20" rx="4" fill="#EF9F27" opacity=".85"/>
      <rect x="34" y="34" width="20" height="20" rx="4" fill="#D85A30" opacity=".85"/>
      <text x="20" y="23" text-anchor="middle" font-size="7" fill="#9FE1CB" font-family="sans-serif">Z1</text>
      <text x="44" y="23" text-anchor="middle" font-size="7" fill="#E1F5EE" font-family="sans-serif">Z2</text>
      <text x="20" y="47" text-anchor="middle" font-size="7" fill="#412402" font-family="sans-serif">Z3</text>
      <text x="44" y="47" text-anchor="middle" font-size="7" fill="#FAECE7" font-family="sans-serif">Z4</text>
    </svg>`,
    what:'Places each learner into one of four zones based on their capability and cognitive autonomy — Zone 1 Ready Performer, Zone 2 Assisted Performer, Zone 3 Emerging Independent, or Zone 4 At Risk.',
    plain:'The zone answers one question: <em>Is this learner ready to work independently, or do they need support?</em> Zone 1 means high capability and high autonomy. Zone 4 means both are low. Zones 2 and 3 identify which dimension needs more attention first.',
    admin:'In the waffle grid, each square is one learner. A mostly red grid (Zone 4) at Assessment 3 improving to mostly teal (Zone 1) by Assessment 9 is the ideal progression. If a centre\'s grid isn\'t shifting, investigate whether the teaching approach is building both capability and independence together.',
    example:'At Assessment 3, one centre\'s waffle grid shows mostly red squares (Zone 4 · At Risk). By Assessment 9 the same grid is mostly amber and teal. Clicking a red square at Assessment 3 opens the drill-down — 24 learners at Zone 4. The Level 3 table shows which batch they belong to, so support can be targeted.'
  },
  {
    id:'PI', rank:'P', suit:'♥', abbr:'PI',
    name:'Procrastination Index',
    icon:`<svg width="64" height="64" viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="22" fill="none" stroke="#ccc" stroke-width="1.5"/>
      <line x1="32" y1="32" x2="32" y2="14" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="32" y1="32" x2="50" y2="36" stroke="#D85A30" stroke-width="2" stroke-linecap="round"/>
      <circle cx="32" cy="32" r="3.5" fill="#C9A84C"/>
      <text x="32" y="11" text-anchor="middle" font-size="7" fill="#1D9E75" font-family="sans-serif">Early</text>
      <text x="54" y="40" text-anchor="start" font-size="7" fill="#D85A30" font-family="sans-serif">Late</text>
    </svg>`,
    what:'Measures when in the available assessment window a learner begins. Calculated as the ratio of start time to total window. Labels: Early (starts promptly), Mid, or Late.',
    plain:'A learner who always starts at the last moment may be <em>anxious, not lazy</em>. Consistently Late labels across multiple assessments is a behavioural signal that often predicts lower performance due to reduced thinking time and increased pressure.',

// ── ILLUSTRATIONS PER METRIC ──────────────────────────────────────────────────
const SUITS = ['♠','♥','♦','♣','♠','♥','♦','♣','♠','♥','♦'];

// ── SEQUENTIAL ROTATION ────────────────────────────────────────────────────────
function getIdx(){
  const stored = localStorage.getItem('drona_motd_idx');
  const lastDate = localStorage.getItem('drona_motd_date');
  const today = new Date().toDateString();
  if(lastDate === today && stored !== null) return parseInt(stored);
  const next = stored !== null ? (parseInt(stored)+1) % METRICS.length : 0;
  localStorage.setItem('drona_motd_idx', next);
  localStorage.setItem('drona_motd_date', today);
  return next;
}

function renderMOTD(){
  const idx = getIdx();
  const m = METRICS[idx];
  const suit = SUITS[idx];
  const rank = m.rank;
  const dots = METRICS.map((_,i) =>
    `<div class="motd-dot${i===idx?' on':''}"></div>`
  ).join('');

  document.getElementById('motdCard').innerHTML = `
    <div class="motd-inner">

      <div class="motd-corner tl"><span class="rank">${rank}</span><span class="suit">${suit}</span></div>
      <div class="motd-corner br"><span class="rank">${rank}</span><span class="suit">${suit}</span></div>

      <div class="motd-eyebrow">Metric of the day</div>

      <div class="motd-illustration">${m.icon}</div>

      <div class="motd-metric-name">${m.name}</div>

      <div class="motd-divider"></div>

      <div class="motd-cols">
        <div>
          <div class="motd-col-head">What it measures</div>
          <div class="motd-col-text">${m.what}</div>
        </div>
        <div>
          <div class="motd-col-head">In simple terms</div>
          <div class="motd-col-text">${m.plain}</div>
        </div>
        <div>
          <div class="motd-col-head">How to read it</div>
          <div class="motd-col-text">${m.admin}</div>
        </div>
        <div>
          <div class="motd-col-head">Example in the analytics</div>
          <div class="motd-col-text">${m.example}</div>
        </div>
      </div>

      <div class="motd-footer">
        <div class="motd-dots">${dots}</div>
        <span class="motd-prog-label">Advances each day · ${idx+1} of ${METRICS.length} metrics</span>
        <div class="motd-badge">${m.abbr}</div>
      </div>

    </div>
  `;
}

renderMOTD();
