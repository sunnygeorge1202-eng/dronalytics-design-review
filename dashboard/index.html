<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dronalytics — Admin Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#E8EDE8;display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:210px;background:#0D1321;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100%;z-index:10}
.sb-brand{padding:28px 22px 20px}
.sb-logo{font-size:18px;font-weight:700;color:#C9A84C}
.sb-role{font-size:10px;font-weight:600;color:#4a6080;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.nav{flex:1;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 22px;font-size:13px;color:#6a8aaa;cursor:pointer;transition:all .15s;border-left:3px solid transparent;text-decoration:none}
.nav-item:hover{color:#C9A84C;background:rgba(201,168,76,.06)}
.nav-item.active{color:#C9A84C;background:rgba(201,168,76,.10);border-left-color:#C9A84C;font-weight:600}
.ni{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-item.active .ni{opacity:1}
.sb-user{padding:16px 22px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.ua{width:34px;height:34px;border-radius:50%;background:#C9A84C;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#0D1321;flex-shrink:0}
.un{font-size:12px;font-weight:600;color:#c8d4e0}
.ur{font-size:10px;color:#4a6080;margin-top:1px}

/* MAIN */
.main{margin-left:210px;flex:1;padding:36px 56px 60px;min-height:100vh}
.welcome-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:36px}
.wt{font-size:26px;font-weight:300;color:#1B3A4B}
.wt strong{font-weight:700}
.dt{font-size:12px;color:#999}

/* NAV CARDS */
.nav-cards{display:flex;gap:48px;justify-content:center;margin-bottom:52px}
.nc-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;text-decoration:none}
.nc{width:180px;height:260px;border-radius:14px;position:relative;overflow:hidden;transition:transform .28s cubic-bezier(.34,1.56,.64,1),box-shadow .28s;box-shadow:0 10px 36px rgba(13,19,33,.28)}
.nc-wrap:nth-child(1) .nc:hover{transform:translateY(-12px) rotate(1.5deg);box-shadow:0 24px 48px rgba(13,19,33,.38)}
.nc-wrap:nth-child(2) .nc:hover{transform:translateY(-12px) rotate(-1.5deg);box-shadow:0 24px 48px rgba(13,19,33,.38)}
.nc-a{background:#0D1321}
.nc-b{background:#0A2218}
.nc-lbl{font-size:13px;font-weight:600;color:#3a4a5a}
.nc-sub{font-size:11px;color:#999;margin-top:1px}

/* HAND SECTION */
.hand-section{text-align:center}
.hand-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.hand-hint{font-size:11px;color:#aaa;margin-bottom:24px}

/* FAN HAND */
.hand-wrap{position:relative;height:200px;display:flex;justify-content:center;align-items:flex-end;margin-bottom:16px;perspective:800px}
.hand-card{position:absolute;width:76px;height:110px;border-radius:8px;cursor:pointer;transform-origin:bottom center;transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,filter .2s;box-shadow:0 4px 14px rgba(13,19,33,.25);bottom:0}
.hand-card:hover{filter:brightness(1.15)}
.hand-card.today{filter:drop-shadow(0 0 8px rgba(201,168,76,.7))}
.hand-card.selected{filter:drop-shadow(0 0 10px rgba(201,168,76,.9))}

/* FACE-UP REVEALED CARD */
.revealed-wrap{margin-top:8px}
.revealed-card{background:#FDFBF5;border-radius:16px;border:1px solid rgba(201,168,76,.30);box-shadow:0 8px 40px rgba(13,19,33,.14);position:relative;overflow:hidden;animation:cardReveal .35s cubic-bezier(.34,1.56,.64,1)}
.revealed-card.ref{background:linear-gradient(160deg,#FEFAEC,#FDF5D0)}
.revealed-card::before{content:'';position:absolute;inset:10px;border:1px solid rgba(201,168,76,.20);border-radius:10px;pointer-events:none;z-index:0}
@keyframes cardReveal{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.rc-inner{padding:22px 30px 18px;position:relative;z-index:1}
.rc-corner{position:absolute;z-index:4;display:flex;flex-direction:column;align-items:center;line-height:1;gap:1px}
.rc-corner.tl{top:14px;left:18px}
.rc-corner.br{bottom:14px;right:18px;transform:rotate(180deg)}
.rc-corner .rk{font-size:15px;font-weight:800;font-family:Georgia,serif;line-height:1;color:#C9A84C}
.rc-corner .st{font-size:12px;color:#C9A84C;line-height:1}
.rc-corner.ref-corner .rk,.rc-corner.ref-corner .st{color:#8B6914}
.rc-eyebrow{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#C9A84C;margin-bottom:4px}
.rc-eyebrow.ref{color:#8B6914}
.rc-illus{display:flex;justify-content:center;margin:6px 0 10px}
.rc-name{text-align:center;font-size:17px;font-weight:700;color:#1B3A4B;margin-bottom:14px;line-height:1.3}
.rc-name.ref{color:#8B6914}
.rc-div{height:1px;background:rgba(201,168,76,.25);margin:0 -30px 14px}
.rc-cols{display:grid;gap:14px;margin-bottom:14px}
.rc-cols.four{grid-template-columns:repeat(4,1fr)}
.rc-col-h{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#C9A84C;margin-bottom:4px}
.rc-col-t{font-size:11.5px;color:#555;line-height:1.6}
.rc-col-t em{color:#1B3A4B;font-style:normal;font-weight:600}

/* label pills */
.lpills{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.lpill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;cursor:default}
.lguide-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#C9A84C;margin-bottom:5px}

/* label guide (Q card) */
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;margin-bottom:12px}
.lgrow{}
.lgrow-name{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}

/* nav steps (K card) */
.nsteps{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;margin-bottom:12px}
.nstep{display:flex;align-items:flex-start;gap:8px;break-inside:avoid}
.nstep-n{width:20px;height:20px;border-radius:50%;background:#C9A84C;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0D1321;flex-shrink:0;margin-top:1px}
.nstep-t{font-size:12px;color:#555;line-height:1.5}
.nstep-t strong{color:#1B3A4B}

/* footer */
.rc-footer{display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(201,168,76,.15);padding-top:12px}
.rc-dots{display:flex;gap:4px}
.rc-dot{width:6px;height:6px;border-radius:50%;background:#e8e0cc}
.rc-dot.on{background:#C9A84C}
.rc-prog{font-size:10px;color:#bbb;font-style:italic}
.rc-badge{font-size:10px;font-weight:700;background:#0D1321;color:#C9A84C;padding:3px 10px;border-radius:99px}
.rc-badge.ref{background:#8B6914}
</style>
</head>

<script>
document.getElementById('dateText').textContent = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

// ── LABEL DATA ────────────────────────────────────────────────────────────────
const LS={
  dci:[{n:'Fragile',bg:'#712B13',t:'#FAECE7',d:'Highly unstable — immediate support needed'},{n:'Emerging',bg:'#D85A30',t:'#FAECE7',d:'Early signs, inconsistent pattern'},{n:'Developing',bg:'#EF9F27',t:'#412402',d:'Progressing but not yet reliable'},{n:'Competent',bg:'#5DCAA5',t:'#04342C',d:'Solid and consistent'},{n:'Strong',bg:'#1D9E75',t:'#E1F5EE',d:'Exceeds expectations reliably'},{n:'Highly Reliable',bg:'#085041',t:'#9FE1CB',d:'Peak readiness'}],
  bpi:[{n:'Developing',bg:'#D85A30',t:'#FAECE7',d:'Struggling at this thinking level'},{n:'Emerging',bg:'#EF9F27',t:'#412402',d:'Early signs of proficiency'},{n:'Proficient',bg:'#1D9E75',t:'#E1F5EE',d:'Consistently performing well'},{n:'Strong',bg:'#085041',t:'#9FE1CB',d:'Excelling at this level'}],
  ccg:[{n:'Underestimated',bg:'#2a78d6',t:'#fff',d:'Doubted themselves but performed well'},{n:'Calibrated',bg:'#1D9E75',t:'#E1F5EE',d:'Self-estimate matched performance'},{n:'Overestimated',bg:'#D85A30',t:'#FAECE7',d:'Overconfident relative to performance'}],
  dqs:[{n:'Low',bg:'#D85A30',t:'#FAECE7',d:'Choices rarely matched ability'},{n:'Improving',bg:'#EF9F27',t:'#412402',d:'Choices becoming better calibrated'},{n:'Aligned',bg:'#1D9E75',t:'#E1F5EE',d:'Commitment choices well matched to ability'}],
  zone:[{n:'Zone 1 · Ready',bg:'#085041',t:'#9FE1CB',d:'High capability + high autonomy'},{n:'Zone 2 · Assisted',bg:'#1D9E75',t:'#E1F5EE',d:'High capability, needs autonomy support'},{n:'Zone 3 · Emerging',bg:'#EF9F27',t:'#412402',d:'Independent but capability still building'},{n:'Zone 4 · At Risk',bg:'#D85A30',t:'#FAECE7',d:'Both capability and autonomy need support'}],
  pi:[{n:'Early',bg:'#1D9E75',t:'#E1F5EE',d:'Started promptly'},{n:'Mid',bg:'#EF9F27',t:'#412402',d:'Started midway through the window'},{n:'Late',bg:'#D85A30',t:'#FAECE7',d:'Started near the deadline'}],
  ums:[{n:'Struggling',bg:'#D85A30',t:'#FAECE7',d:'Performs poorly under ambiguity'},{n:'Improving',bg:'#EF9F27',t:'#412402',d:'Handling uncertainty better over time'},{n:'Strong',bg:'#1D9E75',t:'#E1F5EE',d:'Performs well on hard-to-grade questions'}],
  citime:[{n:'Inconsistent',bg:'#D85A30',t:'#FAECE7',d:'Wide variation across sessions'},{n:'Mod. Stable',bg:'#EF9F27',t:'#412402',d:'Mostly consistent with some variation'},{n:'Stable',bg:'#1D9E75',t:'#E1F5EE',d:'Reliable consistent pattern'}],
  pattern:[{n:'Independent',bg:'#085041',t:'#9FE1CB',d:'Minimal tool use, self-reliant'},{n:'Strategic',bg:'#1D9E75',t:'#E1F5EE',d:'Uses tool to reason, not shortcut'},{n:'Moderate',bg:'#EF9F27',t:'#412402',d:'Balanced tool use'},{n:'Passive',bg:'#B5D4F4',t:'#0C447C',d:'Uses tool but not reflectively'},{n:'Dep. Shortcutter',bg:'#D85A30',t:'#FAECE7',d:'Over-relies on tool for direct answers'},{n:'Over-reliant',bg:'#712B13',t:'#FAECE7',d:'Excessive tool use, low independent thinking'}],
  g10:[{n:'None',bg:'#E8EFF3',t:'#555',d:'No impulsive decisions this assessment'},{n:'Watch',bg:'#EF9F27',t:'#412402',d:'1–2 impulsive decisions — monitor'},{n:'Fires',bg:'#D85A30',t:'#FAECE7',d:'3+ impulsive decisions — act now'}],
  g11:[{n:'None',bg:'#E8EFF3',t:'#555',d:'No missed attempts this assessment'},{n:'Watch',bg:'#EF9F27',t:'#412402',d:'1 unnecessary skip — monitor'},{n:'Fires',bg:'#D85A30',t:'#FAECE7',d:'2+ unnecessary skips — act now'}]
};

function pills(key){return LS[key].map(l=>`<span class="lpill" style="background:${l.bg};color:${l.t}" title="${l.d}">${l.n}</span>`).join('')}

// ── 13 CARDS ──────────────────────────────────────────────────────────────────
const CARDS=[
  {rank:'A',suit:'♠',abbr:'DCI',name:'Learner Readiness',type:'metric',lk:'dci',
   icon:`<svg width="56" height="56" viewBox="0 0 56 56" fill="none"><rect x="4" y="38" width="6" height="12" rx="1.5" fill="#D85A30" opacity=".7"/><rect x="13" y="28" width="6" height="22" rx="1.5" fill="#EF9F27" opacity=".8"/><rect x="22" y="18" width="6" height="32" rx="1.5" fill="#5DCAA5"/><rect x="31" y="8" width="6" height="42" rx="1.5" fill="#085041"/><line x1="4" y1="36" x2="40" y2="6" stroke="#C9A84C" stroke-width="1.4" stroke-dasharray="4 3"/></svg>`,
   what:'A readiness label summarising a learner\'s overall capability — combining proficiency across Bloom levels, decision quality, and cognitive autonomy.',
   plain:'Think of it as the learner\'s <em>readiness label</em>. Competent or Strong = performs consistently and independently. Fragile or Emerging = pattern hasn\'t stabilised yet.',
   admin:'Watch how the label changes across assessments — Emerging → Developing → Competent is the trajectory that matters. A centre stuck at Developing needs pedagogical review, not just more content.',
   example:'In the Learner Readiness heatmap, one centre shifts amber → teal between Assessments 7 and 10. Clicking a cell → Level 3 learner table shows which batch is still Fragile.'},
  {rank:'2',suit:'♥',abbr:'BPI',name:'Thinking Depth',type:'metric',lk:'bpi',
   icon:`<svg width="56" height="56" viewBox="0 0 56 56" fill="none"><circle cx="28" cy="28" r="18" fill="none" stroke="#C9A84C" stroke-width="1" opacity=".3"/><line x1="28" y1="28" x2="28" y2="11" stroke="#085041" stroke-width="2.5" stroke-linecap="round"/><line x1="28" y1="28" x2="40" y2="18" stroke="#1D9E75" stroke-width="2" stroke-linecap="round"/><line x1="28" y1="28" x2="44" y2="30" stroke="#EF9F27" stroke-width="2" stroke-linecap="round"/><line x1="28" y1="28" x2="36" y2="44" stroke="#D85A30" stroke-width="2" stroke-linecap="round"/><circle cx="28" cy="28" r="3.5" fill="#C9A84C"/></svg>`,
   what:'How well a learner performs across each of the six Bloom levels — from basic recall (Remember) through to complex thinking (Create). Available per skill.',
   plain:'Tells you <em>where in the thinking hierarchy</em> a learner is strong. Strong at Remember but weak at Analyse = can recall facts but not yet use them.',
   admin:'Filter by Skill and Bloom level. If one centre shows Developing at Evaluate and Create consistently, teaching hasn\'t moved beyond recall — a specific pedagogical issue.',
   example:'Filter to Listening + Evaluate. One centre dark red (Developing) all 15 assessments; another teal (Proficient) from Assessment 5. Drill A8: 14 Proficient, 6 Strong, 2 Emerging.'},
  {rank:'3',suit:'♦',abbr:'CCG',name:'Self-Awareness',type:'metric',lk:'ccg',
   icon:`<svg width="56" height="56" viewBox="0 0 56 56" fill="none"><line x1="28" y1="8" x2="28" y2="48" stroke="#ccc" stroke-width="1.5"/><rect x="8" y="22" width="18" height="12" rx="3" fill="#2a78d6" opacity=".8"/><rect x="30" y="22" width="18" height="12" rx="3" fill="#D85A30" opacity=".8"/><circle cx="28" cy="28" r="3" fill="#C9A84C"/></svg>`,
   what:'The gap between how confident a learner says they are and how well they actually perform. Shows Calibrated, Overestimated, or Underestimated.',
   plain:'A calibrated learner <em>knows what they know</em>. Overestimated = thought they did well but didn\'t. Underestimated = doubted themselves but actually performed fine.',
   admin:'In the CCG dot plot, watch each centre\'s trail. Rising toward Calibrated = improving self-awareness. Stuck at Overestimated = structured reflection needed after each assessment.',
   example:'One centre\'s dots cluster at Overestimated through Assessments 1–6, then rise to Calibrated by A10. Clicking A4: mostly Overestimated. Level 3 table identifies learners for feedback.'},
  {rank:'4',suit:'♣',abbr:'DQS',name:'Decision Accuracy',type:'metric',lk:'dqs',
   icon:`<svg width="56" height="56" viewBox="0 0 56 56" fill="none"><rect x="6" y="22" width="12" height="22" rx="2.5" fill="#D85A30" opacity=".85"/><rect x="22" y="16" width="12" height="28" rx="2.5" fill="#EF9F27" opacity=".85"/><rect x="38" y="10" width="12" height="34" rx="2.5" fill="#1D9E75" opacity=".9"/><line x1="6" y1="48" x2="52" y2="48" stroke="#C9A84C" stroke-width="1" opacity=".5"/></svg>`,
   what:'How well a learner\'s All-In, Show, and Skip choices matched their actual performance. Aligned = commitment decisions were well-calibrated to ability.',
   plain:'<em>DQS rewards good judgement</em> — All-In when strong, Skip when genuinely unsure. Committing fully on a weak answer, or skipping when capable, both reduce the score.',

// ── FAN LAYOUT ────────────────────────────────────────────────────────────────
// 13 cards, fan spread ~130°, centred
const TOTAL = CARDS.length;
const SPREAD = 130; // total degrees
const RADIUS = 320; // fan radius
const CARD_W = 76, CARD_H = 110;

function getStoredIdx(){
  const stored = localStorage.getItem('drona_motd_idx');
  const lastDate = localStorage.getItem('drona_motd_date');
  const today = new Date().toDateString();
  if(lastDate === today && stored !== null) return parseInt(stored);
  const next = stored !== null ? (parseInt(stored)+1) % TOTAL : 0;
  localStorage.setItem('drona_motd_idx', next);
  localStorage.setItem('drona_motd_date', today);
  return next;
}

let todayIdx = getStoredIdx();
let selectedIdx = todayIdx;

function buildHand(){
  const wrap = document.getElementById('handWrap');
  wrap.innerHTML = '';
  const centerX = wrap.offsetWidth / 2;
  const startAngle = -SPREAD / 2;
  const step = SPREAD / (TOTAL - 1);

  CARDS.forEach((c, i) => {
    const angle = startAngle + step * i;
    const rad = angle * Math.PI / 180;
    const x = centerX - CARD_W/2 + Math.sin(rad) * (RADIUS * 0.18);
    const yLift = i === todayIdx ? -18 : i === selectedIdx ? -12 : 0;
    const zIndex = i === selectedIdx || i === todayIdx ? 20 : i + 1;

    const card = document.createElement('div');
    card.className = 'hand-card' + (i === todayIdx ? ' today' : '') + (i === selectedIdx ? ' selected' : '');
    card.style.cssText = `left:${x}px;transform:rotate(${angle}deg) translateY(${yLift}px);z-index:${zIndex};`;
    card.innerHTML = buildCardBack(c, i);
    card.onclick = () => selectCard(i);
    wrap.appendChild(card);
  });
}

function buildCardBack(c, i){
  const isRef = c.type === 'reference';
  const bg = isRef ? '#1A1400' : (i % 2 === 0 ? '#0D1321' : '#0A2218');
  const pat = isRef ? 'pc' : (i % 2 === 0 ? 'pa' : 'pb');
  return `<svg width="${CARD_W}" height="${CARD_H}" viewBox="0 0 ${CARD_W} ${CARD_H}" style="display:block;border-radius:8px">
    <defs>
      <pattern id="${pat}${i}" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
        ${i % 2 === 0
          ? `<path d="M6 0L12 6L6 12L0 6Z" fill="none" stroke="rgba(201,168,76,${isRef?'0.25':'0.16'})" stroke-width="0.6"/>`
          : `<circle cx="6" cy="6" r="1" fill="rgba(201,168,76,${isRef?'0.28':'0.20'})"/><line x1="0" y1="0" x2="12" y2="12" stroke="rgba(201,168,76,0.07)" stroke-width="0.5"/><line x1="12" y1="0" x2="0" y2="12" stroke="rgba(201,168,76,0.07)" stroke-width="0.5"/>`}
      </pattern>
    </defs>
    <rect width="${CARD_W}" height="${CARD_H}" fill="${bg}" rx="8"/>
    <rect width="${CARD_W}" height="${CARD_H}" fill="url(#${pat}${i})" rx="8"/>
    <rect x="5" y="5" width="${CARD_W-10}" height="${CARD_H-10}" rx="5" fill="none" stroke="rgba(201,168,76,0.32)" stroke-width="0.8"/>
    <text x="8" y="17" font-family="Georgia,serif" font-size="11" fill="rgba(201,168,76,${isRef?'0.85':'0.72'})" font-weight="bold">${c.rank}</text>
    <text x="8" y="27" font-family="Georgia,serif" font-size="9" fill="rgba(201,168,76,${isRef?'0.70':'0.52'})">${c.suit||'♣'}</text>
  </svg>`;
}

function selectCard(i){
  selectedIdx = i;
  buildHand();
  renderRevealed(i);
  setTimeout(()=>{
    document.getElementById('revealedWrap').scrollIntoView({behavior:'smooth',block:'nearest'});
  },100);
}

function renderRevealed(idx){
  const c = CARDS[idx];
  const isRef = c.type === 'reference';
  const wrap = document.getElementById('revealedWrap');
  const isToday = idx === todayIdx;

  let inner = '';

  if(!isRef){
    inner = `
      <div class="rc-corner tl"><span class="rk">${c.rank}</span><span class="st">${c.suit}</span></div>
      <div class="rc-corner br"><span class="rk">${c.rank}</span><span class="st">${c.suit}</span></div>
      <div class="rc-inner">
        <div class="rc-eyebrow">${isToday?'Today\'s metric · ':'Metric · '}${c.abbr}</div>
        <div class="rc-illus">${c.icon}</div>
        <div class="rc-name">${c.name}</div>
        <div class="rc-div"></div>
        <div class="rc-cols four">
          <div><div class="rc-col-h">What it measures</div><div class="rc-col-t">${c.what}</div></div>
          <div><div class="rc-col-h">In simple terms</div><div class="rc-col-t">${c.plain}</div></div>
          <div><div class="rc-col-h">How to read it</div><div class="rc-col-t">${c.admin}</div></div>
          <div><div class="rc-col-h">Example in analytics</div><div class="rc-col-t">${c.example}</div></div>
        </div>
        <div class="rc-div"></div>
        <div style="margin-bottom:12px">
          <div class="lguide-title">Label guide — ${c.name}</div>
          <div class="lpills">${pills(c.lk)}</div>
          <div style="font-size:9px;color:#aaa;font-style:italic;margin-top:4px">Hover any label to see what it means</div>
        </div>
        <div class="rc-footer">
          <div class="rc-dots">${CARDS.map((_,i)=>`<div class="rc-dot${i===idx?' on':''}"></div>`).join('')}</div>
          <span class="rc-prog">Card ${idx+1} of 13${isToday?' · today\'s card':''}</span>
          <div class="rc-badge">${c.abbr}</div>
        </div>
      </div>`;
  } else if(c.rank==='Q'){
    const metricRows=[
      {name:'Learner Readiness',k:'dci'},{name:'Thinking Depth',k:'bpi'},{name:'Self-Awareness',k:'ccg'},
      {name:'Decision Accuracy',k:'dqs'},{name:'Learner Positioning',k:'zone'},{name:'Start Behaviour',k:'pi'},
      {name:'Handling Uncertainty',k:'ums'},{name:'Performance Consistency',k:'citime'},
      {name:'AI Tool Use',k:'pattern'},{name:'Rushed Decisions',k:'g10'},{name:'Missed Attempts',k:'g11'}
    ];
    inner = `
      <div class="rc-corner tl ref-corner"><span class="rk" style="color:#8B6914">Q</span><span class="st" style="color:#8B6914">♣</span></div>
      <div class="rc-corner br ref-corner"><span class="rk" style="color:#8B6914">Q</span><span class="st" style="color:#8B6914">♣</span></div>
      <div class="rc-inner">
        <div class="rc-eyebrow ref">Reference card${isToday?' · today\'s card':''}</div>
        <div class="rc-illus">${c.icon}</div>
        <div class="rc-name ref">${c.name}</div>
        <div style="font-size:11px;color:#8B6914;text-align:center;margin-bottom:12px">${c.subtitle}</div>
        <div class="rc-div"></div>
        <div class="lgrid">
          ${metricRows.map(m=>`<div class="lgrow"><div class="lgrow-name">${m.name}</div><div class="lpills">${pills(m.k)}</div></div>`).join('')}
        </div>
        <div class="rc-footer">
          <div class="rc-dots">${CARDS.map((_,i)=>`<div class="rc-dot${i===idx?' on':''}"></div>`).join('')}</div>
          <span class="rc-prog">Card ${idx+1} of 13${isToday?' · today\'s card':''}</span>
          <div class="rc-badge ref">REF</div>
        </div>
      </div>`;
  } else {
    const steps=[
      {n:1,t:'<strong>Compare centres</strong> — every heatmap shows all centres as rows. Dark colour = strong label concentrated in that centre.'},
      {n:2,t:'<strong>Pick an assessment</strong> — columns are A1–A15. Click any cell to drill into that centre + assessment. Use the slider on snapshot views.'},
      {n:3,t:'<strong>Level 1 — Distribution</strong> — colour-only bar appears below. Each segment is a label. Click a segment to see counts.'},
      {n:4,t:'<strong>Level 2 — Counts &amp; change</strong> — count cards show how many learners per label and whether the % changed from previous assessment.'},
      {n:5,t:'<strong>Level 3 — Learner table</strong> — click any count card to see named learners. Use this to plan targeted follow-up with centre coordinators.'},
      {n:6,t:'<strong>CEFR filter</strong> — use the selector at the top to focus on A2, B1, or B2 learners only. All charts and drill-downs update instantly.'},
    ];
    inner = `
      <div class="rc-corner tl ref-corner"><span class="rk" style="color:#8B6914">K</span><span class="st" style="color:#8B6914">♠</span></div>
      <div class="rc-corner br ref-corner"><span class="rk" style="color:#8B6914">K</span><span class="st" style="color:#8B6914">♠</span></div>
      <div class="rc-inner">
        <div class="rc-eyebrow ref">Reference card${isToday?' · today\'s card':''}</div>
        <div class="rc-illus">${c.icon}</div>
        <div class="rc-name ref">${c.name}</div>
        <div style="font-size:11px;color:#8B6914;text-align:center;margin-bottom:12px">${c.subtitle}</div>
        <div class="rc-div"></div>
        <div class="nsteps">
          ${steps.map(s=>`<div class="nstep"><div class="nstep-n">${s.n}</div><div class="nstep-t">${s.t}</div></div>`).join('')}
        </div>
        <div class="rc-footer">
          <div class="rc-dots">${CARDS.map((_,i)=>`<div class="rc-dot${i===idx?' on':''}"></div>`).join('')}</div>
          <span class="rc-prog">Card ${idx+1} of 13${isToday?' · today\'s card':''}</span>
          <div class="rc-badge ref">REF</div>
        </div>
      </div>`;
  }

  wrap.innerHTML = `<div class="revealed-card${isRef?' ref':''}">${inner}</div>`;
}

// init
window.addEventListener('resize', buildHand);
buildHand();
renderRevealed(selectedIdx);
</script>
