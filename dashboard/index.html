<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dronalytics — Admin Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#E8EDE8;display:flex;min-height:100vh;color:#1a1a1a}

/* SIDEBAR */
.sidebar{width:210px;min-height:100vh;background:#0D1321;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100%;z-index:10}
.sb-brand{padding:28px 22px 20px}
.sb-logo{font-size:18px;font-weight:700;color:#C9A84C;letter-spacing:.3px}
.sb-role{font-size:10px;font-weight:600;color:#4a6080;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.nav{flex:1;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 22px;font-size:13px;color:#6a8aaa;cursor:pointer;transition:all .15s;border-left:3px solid transparent;text-decoration:none}
.nav-item:hover{color:#C9A84C;background:rgba(201,168,76,.06)}
.nav-item.active{color:#C9A84C;background:rgba(201,168,76,.10);border-left-color:#C9A84C;font-weight:600}
.ni{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-item.active .ni{opacity:1}
.sb-user{padding:16px 22px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.ua{width:34px;height:34px;border-radius:50%;background:#C9A84C;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#0D1321;flex-shrink:0}
.un{font-size:12px;font-weight:600;color:#c8d4e0}
.ur{font-size:10px;color:#4a6080;margin-top:1px}

/* MAIN */
.main{margin-left:210px;flex:1;padding:36px 56px 60px;min-height:100vh}
.welcome-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:40px}
.wt{font-size:26px;font-weight:300;color:#1B3A4B}
.wt strong{font-weight:700}
.dt{font-size:12px;color:#999}

/* NAV CARDS */
.nav-cards{display:flex;gap:48px;justify-content:center;margin-bottom:56px}
.nc-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;cursor:pointer;text-decoration:none}
.nc{width:190px;height:276px;border-radius:16px;position:relative;overflow:hidden;transition:transform .28s cubic-bezier(.34,1.56,.64,1),box-shadow .28s ease;box-shadow:0 10px 40px rgba(13,19,33,.30),0 2px 8px rgba(13,19,33,.15)}
.nc-wrap:nth-child(1) .nc:hover{transform:translateY(-14px) rotate(1.5deg);box-shadow:0 28px 56px rgba(13,19,33,.4)}
.nc-wrap:nth-child(2) .nc:hover{transform:translateY(-14px) rotate(-1.5deg);box-shadow:0 28px 56px rgba(13,19,33,.4)}
.nc.navy{background:#0D1321}
.nc.teal{background:#0A2218}
.nc-lbl{font-size:13px;font-weight:600;color:#3a4a5a;letter-spacing:.3px}
.nc-sub{font-size:11px;color:#999;margin-top:1px}

/* HAND SECTION */
.hand-section{margin-bottom:8px}
.hand-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.8px;text-align:center;margin-bottom:20px}

/* CARD HAND FAN */
.hand-fan-wrap{position:relative;height:220px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:0;perspective:1000px}
.hand-fan{position:relative;width:100%;height:100%;display:flex;align-items:flex-end;justify-content:center}
.fan-card{width:78px;height:114px;border-radius:8px;position:absolute;bottom:0;transform-origin:bottom center;cursor:pointer;transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,filter .2s;box-shadow:0 4px 16px rgba(13,19,33,.25);overflow:hidden;border:1px solid rgba(201,168,76,.3)}
.fan-card:hover{filter:brightness(1.15)}
.fan-card.today{box-shadow:0 0 0 2.5px #C9A84C, 0 8px 24px rgba(201,168,76,.4) !important;filter:brightness(1.1)}
.fan-card.selected{box-shadow:0 0 0 2.5px #C9A84C, 0 16px 40px rgba(13,19,33,.4) !important}

/* rank badge on fan cards */
.fc-rank{position:absolute;top:6px;left:7px;font-family:Georgia,serif;font-size:11px;font-weight:700;color:rgba(201,168,76,.85);line-height:1;z-index:2}
.fc-suit{position:absolute;top:19px;left:8px;font-size:9px;color:rgba(201,168,76,.65);z-index:2}
.fc-today-badge{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:7px;font-weight:700;background:#C9A84C;color:#0D1321;padding:2px 5px;border-radius:3px;white-space:nowrap;letter-spacing:.3px;z-index:2}
.fc-ref-badge{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:7px;font-weight:700;background:rgba(201,168,76,.5);color:#0D1321;padding:2px 5px;border-radius:3px;white-space:nowrap;letter-spacing:.3px;z-index:2}

/* FACE CARD (expanded below hand) */
.face-card-wrap{margin-top:24px;min-height:280px}
.face-card{background:#FDFBF5;border-radius:16px;border:1px solid rgba(201,168,76,.3);box-shadow:0 8px 40px rgba(13,19,33,.14);overflow:hidden;position:relative;animation:flipIn .35s cubic-bezier(.34,1.26,.64,1)}
.face-card.reference{background:linear-gradient(160deg,#FEFAEC 0%,#FDF5D0 100%)}
.face-card::before{content:'';position:absolute;inset:10px;border:1px solid rgba(201,168,76,.18);border-radius:10px;pointer-events:none;z-index:0}
@keyframes flipIn{from{opacity:0;transform:rotateX(-12deg) scale(.97)}to{opacity:1;transform:rotateX(0) scale(1)}}

.fc-inner{padding:22px 32px 20px;position:relative;z-index:1}
.fc-corner{position:absolute;z-index:3;display:flex;flex-direction:column;align-items:center;gap:1px}
.fc-corner.tl{top:14px;left:18px}
.fc-corner.br{bottom:14px;right:18px;transform:rotate(180deg)}
.fc-corner .rnk{font-size:16px;font-weight:800;color:#C9A84C;font-family:Georgia,serif;line-height:1}
.fc-corner .sut{font-size:12px;color:#C9A84C;line-height:1}
.fc-corner.ref .rnk,.fc-corner.ref .sut{color:#8B6914}

.fc-eyebrow{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#C9A84C;margin-bottom:5px}
.fc-eyebrow.ref{color:#8B6914}
.fc-illus{display:flex;justify-content:center;margin:8px 0 12px}
.fc-name{text-align:center;font-size:17px;font-weight:700;color:#1B3A4B;margin-bottom:14px;line-height:1.3}
.fc-name.ref{color:#8B6914}
.fc-div{height:1px;background:rgba(201,168,76,.22);margin:0 -32px 16px}

.fc-cols{display:grid;gap:16px;margin-bottom:16px}
.fc-cols.four{grid-template-columns:repeat(4,1fr)}
.fc-col-h{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#C9A84C;margin-bottom:4px}
.fc-col-h.ref{color:#8B6914}
.fc-col-t{font-size:11.5px;color:#555;line-height:1.6}
.fc-col-t em{color:#1B3A4B;font-style:normal;font-weight:600}

.lpills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:3px}
.lpill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;white-space:nowrap;cursor:default}
.lpill-hint{font-size:9px;color:#aaa;font-style:italic}

.ref-cols{display:grid;gap:16px;margin-bottom:16px}
.ref-cols.two{grid-template-columns:repeat(2,1fr)}
.lgr-row{margin-bottom:8px;break-inside:avoid}
.lgr-metric{font-size:9px;font-weight:700;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}

.ns-steps{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.ns-step{display:flex;align-items:flex-start;gap:8px}
.ns-num{width:20px;height:20px;border-radius:50%;background:#C9A84C;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0D1321;flex-shrink:0;margin-top:1px}
.ns-text{font-size:11.5px;color:#555;line-height:1.5}
.ns-text strong{color:#1B3A4B}

.fc-footer{display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(201,168,76,.15);padding-top:12px}
.fc-dots{display:flex;gap:4px}
.fc-dot{width:6px;height:6px;border-radius:50%;background:#e8e0cc}
.fc-dot.on{background:#C9A84C}
.fc-prog{font-size:10px;color:#bbb;font-style:italic}
.fc-badge{font-size:10px;font-weight:700;background:#0D1321;color:#C9A84C;padding:3px 10px;border-radius:99px}
.fc-badge.ref{background:#8B6914}
</style>
</head>

          <defs><pattern id="p1" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse"><path d="M9 0L18 9L9 18L0 9Z" fill="none" stroke="rgba(201,168,76,0.15)" stroke-width="0.7"/></pattern></defs>

<script>
document.getElementById('dateText').textContent = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

// ── LABEL DATA ────────────────────────────────────────────────────────────────
const LS={
  dci:[{n:'Fragile',bg:'#712B13',t:'#FAECE7',d:'Highly unstable. Needs immediate support.'},{n:'Emerging',bg:'#D85A30',t:'#FAECE7',d:'Early signs. Inconsistent pattern.'},{n:'Developing',bg:'#EF9F27',t:'#412402',d:'Progressing but not yet reliable.'},{n:'Competent',bg:'#5DCAA5',t:'#04342C',d:'Solid and consistent.'},{n:'Strong',bg:'#1D9E75',t:'#E1F5EE',d:'Exceeds expectations reliably.'},{n:'Highly Reliable',bg:'#085041',t:'#9FE1CB',d:'Peak readiness.'}],
  bpi:[{n:'Developing',bg:'#D85A30',t:'#FAECE7',d:'Struggling at this level.'},{n:'Emerging',bg:'#EF9F27',t:'#412402',d:'Early signs of proficiency.'},{n:'Proficient',bg:'#1D9E75',t:'#E1F5EE',d:'Performing consistently well.'},{n:'Strong',bg:'#085041',t:'#9FE1CB',d:'Excelling at this level.'}],
  ccg:[{n:'Underestimated',bg:'#2a78d6',t:'#fff',d:'Doubted themselves but performed well.'},{n:'Calibrated',bg:'#1D9E75',t:'#E1F5EE',d:'Self-estimate matched performance.'},{n:'Overestimated',bg:'#D85A30',t:'#FAECE7',d:'Overconfident relative to performance.'}],
  dqs:[{n:'Low',bg:'#D85A30',t:'#FAECE7',d:'Commitment choices rarely matched ability.'},{n:'Improving',bg:'#EF9F27',t:'#412402',d:'Choices becoming better calibrated.'},{n:'Aligned',bg:'#1D9E75',t:'#E1F5EE',d:'Commitment well matched to ability.'}],
  zone:[{n:'Z1·Ready',bg:'#085041',t:'#9FE1CB',d:'High capability + high autonomy.'},{n:'Z2·Assisted',bg:'#1D9E75',t:'#E1F5EE',d:'High capability, needs autonomy support.'},{n:'Z3·Emerging',bg:'#EF9F27',t:'#412402',d:'Independent but capability still building.'},{n:'Z4·At Risk',bg:'#D85A30',t:'#FAECE7',d:'Both need support.'}],
  pi:[{n:'Early',bg:'#1D9E75',t:'#E1F5EE',d:'Started promptly.'},{n:'Mid',bg:'#EF9F27',t:'#412402',d:'Started midway through.'},{n:'Late',bg:'#D85A30',t:'#FAECE7',d:'Started near the deadline.'}],
  ums:[{n:'Struggling',bg:'#D85A30',t:'#FAECE7',d:'Performs poorly under ambiguity.'},{n:'Improving',bg:'#EF9F27',t:'#412402',d:'Handling uncertainty better over time.'},{n:'Strong',bg:'#1D9E75',t:'#E1F5EE',d:'Performs well on ambiguous questions.'}],
  citime:[{n:'Inconsistent',bg:'#D85A30',t:'#FAECE7',d:'Wide variation across sessions.'},{n:'Mod. Stable',bg:'#EF9F27',t:'#412402',d:'Mostly consistent with some variation.'},{n:'Stable',bg:'#1D9E75',t:'#E1F5EE',d:'Reliable, consistent pattern.'}],
  pattern:[{n:'Independent',bg:'#085041',t:'#9FE1CB',d:'Minimal tool use, self-reliant.'},{n:'Strategic',bg:'#1D9E75',t:'#E1F5EE',d:'Uses tool to reason, not shortcut.'},{n:'Moderate',bg:'#EF9F27',t:'#412402',d:'Balanced tool use.'},{n:'Passive',bg:'#B5D4F4',t:'#0C447C',d:'Uses tool but not reflectively.'},{n:'Dep.Shortcutter',bg:'#D85A30',t:'#FAECE7',d:'Over-relies on tool for direct answers.'},{n:'Over-reliant',bg:'#712B13',t:'#FAECE7',d:'Excessive tool use, low independent thinking.'}],
  g10:[{n:'None',bg:'#E8EFF3',t:'#555',d:'No impulsive decisions.'},{n:'Watch',bg:'#EF9F27',t:'#412402',d:'1–2 impulsive decisions. Monitor.'},{n:'Fires',bg:'#D85A30',t:'#FAECE7',d:'3+ impulsive decisions. Act now.'}],
  g11:[{n:'None',bg:'#E8EFF3',t:'#555',d:'No missed attempts.'},{n:'Watch',bg:'#EF9F27',t:'#412402',d:'1 unnecessary skip. Monitor.'},{n:'Fires',bg:'#D85A30',t:'#FAECE7',d:'2+ unnecessary skips. Act now.'}]
};
function pills(key){return LS[key].map(l=>`<span class="lpill" style="background:${l.bg};color:${l.t}" title="${l.d}">${l.n}</span>`).join('')}

// ── 13 CARDS ──────────────────────────────────────────────────────────────────
const CARDS=[
  {rank:'A',suit:'♠',type:'metric',abbr:'DCI',name:'Learner Readiness',labelKey:'dci',
   icon:`<svg width="56" height="56" viewBox="0 0 56 56" fill="none"><rect x="4" y="38" width="6" height="12" rx="1.5" fill="#D85A30" opacity=".7"/><rect x="13" y="28" width="6" height="22" rx="1.5" fill="#EF9F27" opacity=".8"/><rect x="22" y="18" width="6" height="32" rx="1.5" fill="#5DCAA5"/><rect x="31" y="8" width="6" height="42" rx="1.5" fill="#085041"/><line x1="4" y1="36" x2="40" y2="6" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="4 3"/></svg>`,
   what:'A readiness label summarising overall capability — combining proficiency across Bloom levels, decision quality, and cognitive autonomy.',
   plain:'Think of it as the learner\'s <em>readiness label</em>. Competent or Strong means consistent, independent performance. Fragile or Emerging means the pattern hasn\'t stabilised yet.',
   admin:'Watch how labels change across assessments. A centre stuck at Developing across multiple assessments needs pedagogical review — not just more content.',
   example:'One centre\'s heatmap row shifts from amber (Developing) to teal (Competent) between Assessments 7 and 10. Clicking a cell → Level 3 learner table shows which batch is still Fragile.'},
  {rank:'2',suit:'♥',type:'metric',abbr:'BPI',name:'Thinking Depth',labelKey:'bpi',
   icon:`<svg width="56" height="56" viewBox="0 0 56 56" fill="none"><circle cx="28" cy="28" r="18" fill="none" stroke="#C9A84C" stroke-width="1" opacity=".3"/><line x1="28" y1="28" x2="28" y2="12" stroke="#085041" stroke-width="2.5" stroke-linecap="round"/><line x1="28" y1="28" x2="40" y2="19" stroke="#1D9E75" stroke-width="2" stroke-linecap="round"/><line x1="28" y1="28" x2="44" y2="30" stroke="#EF9F27" stroke-width="2" stroke-linecap="round"/><line x1="28" y1="28" x2="36" y2="44" stroke="#D85A30" stroke-width="2" stroke-linecap="round"/><circle cx="28" cy="28" r="3.5" fill="#C9A84C"/></svg>`,
   what:'Performance across the six Bloom levels — Remember through Create. Available per skill: Reading, Listening, Writing, Speaking.',
   plain:'Tells you <em>where in the thinking hierarchy</em> a learner is strong. Strong at Remember but weak at Analyse means recall without application.',
   admin:'Filter by Skill and Bloom level. One centre Developing at Evaluate while another is Proficient from Assessment 5 signals different teaching depths.',
   example:'Filter to Listening + Evaluate. One centre stays dark red (Developing) across 15 assessments. Another shows teal from Assessment 5. Drill into Assessment 8: 14 Proficient, 6 Strong, 2 Emerging.'},
  {rank:'3',suit:'♦',type:'metric',abbr:'CCG',name:'Self-Awareness',labelKey:'ccg',
   icon:`<svg width="56" height="56" viewBox="0 0 56 56" fill="none"><line x1="28" y1="8" x2="28" y2="48" stroke="#ccc" stroke-width="1.5"/><rect x="8" y="22" width="17" height="12" rx="3" fill="#2a78d6" opacity=".8"/><rect x="31" y="22" width="17" height="12" rx="3" fill="#D85A30" opacity=".8"/><circle cx="28" cy="28" r="3" fill="#C9A84C"/></svg>`,
   what:'Gap between how confident a learner says they are and how well they actually perform. Shows size and direction — Calibrated, Overestimated, or Underestimated.',
   plain:'A calibrated learner <em>knows what they know</em>. Overestimated = thought they did well but didn\'t. Underestimated = doubted themselves but performed fine.',
   admin:'Watch each centre\'s trail in the dot plot. Rising toward Calibrated = improving self-awareness. Stuck at Overestimated = structured reflection needed.',
   example:'One centre\'s dots are Overestimated through Assessments 1–6, then rise to Calibrated by Assessment 10. Level 3 table identifies learners for feedback conversations.'},
  {rank:'4',suit:'♣',type:'metric',abbr:'DQS',name:'Decision Accuracy',labelKey:'dqs',

// ── FAN LAYOUT ────────────────────────────────────────────────────────────────
const N=13;
const SPREAD=150; // total arc degrees
const START_ANGLE=-(SPREAD/2);
const STEP=SPREAD/(N-1);
const SUITS_ALL=['♠','♥','♦','♣','♠','♥','♦','♣','♠','♥','♦','♣','♠'];
const COLORS_ALL=['#0D1321','#0A1A18','#0C1810','#0D1321','#0A2218','#0D1321','#0C1810','#0D1321','#0A1A18','#0D1321','#0C1810','#0A2218','#0D1321'];

let todayIdx=0,selectedIdx=null;

function getStoredIdx(){
  const s=localStorage.getItem('drona_motd_idx');
  const d=localStorage.getItem('drona_motd_date');
  const today=new Date().toDateString();
  if(d===today&&s!==null)return parseInt(s);
  const next=s!==null?(parseInt(s)+1)%N:0;
  localStorage.setItem('drona_motd_idx',next);
  localStorage.setItem('drona_motd_date',today);
  return next;
}

function buildFan(){
  todayIdx=getStoredIdx();
  selectedIdx=todayIdx;
  const fan=document.getElementById('handFan');
  fan.innerHTML='';
  const W=fan.offsetWidth||700;
  const centerX=W/2;

  CARDS.forEach((c,i)=>{
    const angle=START_ANGLE+i*STEP;
    const rad=angle*Math.PI/180;
    // spread horizontally
    const offsetX=(i-(N-1)/2)*38;
    const card=document.createElement('div');
    card.className='fan-card'+(i===todayIdx?' today':'');
    card.dataset.idx=i;

    // background SVG pattern
    const bg=COLORS_ALL[i];
    const isRef=(c.type==='reference');
    const bgColor=isRef?'#2A1F0A':bg;

    card.innerHTML=`<svg width="78" height="114" viewBox="0 0 78 114" style="position:absolute;inset:0">
      <defs><pattern id="fp${i}" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
        ${i%2===0?`<path d="M7 0L14 7L7 14L0 7Z" fill="none" stroke="rgba(201,168,76,0.18)" stroke-width="0.6"/>`:`<circle cx="7" cy="7" r="1.1" fill="rgba(201,168,76,0.22)"/><line x1="0" y1="0" x2="14" y2="14" stroke="rgba(201,168,76,0.08)" stroke-width="0.5"/>`}
      </pattern></defs>
      <rect width="78" height="114" fill="${bgColor}"/>
      <rect width="78" height="114" fill="url(#fp${i})"/>
      <rect x="4" y="4" width="70" height="106" rx="6" fill="none" stroke="rgba(201,168,76,0.3)" stroke-width="0.8"/>
    </svg>
    <div class="fc-rank">${c.rank}</div>
    <div class="fc-suit">${SUITS_ALL[i]}</div>
    ${i===todayIdx?'<div class="fc-today-badge">TODAY</div>':''}
    ${isRef?'<div class="fc-ref-badge">REF</div>':''}`;

    card.style.transform=`translateX(${offsetX}px) rotate(${angle}deg)`;
    card.style.zIndex=i===todayIdx?20:i;
    card.addEventListener('click',()=>selectCard(i));
    fan.appendChild(card);
  });

  renderFaceCard(selectedIdx);
}

function selectCard(i){
  selectedIdx=i;
  document.querySelectorAll('.fan-card').forEach((c,ci)=>{
    c.classList.remove('selected');
    if(ci===i) c.classList.add('selected');
  });
  renderFaceCard(i);
}

function renderFaceCard(i){
  const c=CARDS[i];
  const wrap=document.getElementById('faceCardWrap');
  const isRef=c.type==='reference';
  const suit=SUITS_ALL[i];
  const rank=c.rank;
  const isToday=i===todayIdx;

  let content='';

  if(!isRef){
    content=`
    <div class="fc-corner tl"><span class="rnk">${rank}</span><span class="sut">${suit}</span></div>
    <div class="fc-corner br"><span class="rnk">${rank}</span><span class="sut">${suit}</span></div>
    <div class="fc-inner">
      <div class="fc-eyebrow">Metric of the day${isToday?' &nbsp;·&nbsp; TODAY':''} &nbsp;·&nbsp; ${c.abbr}</div>
      <div class="fc-illus">${c.icon}</div>
      <div class="fc-name">${c.name}</div>
      <div class="fc-div"></div>
      <div class="fc-cols four">
        <div><div class="fc-col-h">What it measures</div><div class="fc-col-t">${c.what}</div></div>
        <div><div class="fc-col-h">In simple terms</div><div class="fc-col-t">${c.plain}</div></div>
        <div><div class="fc-col-h">How to read it</div><div class="fc-col-t">${c.admin}</div></div>
        <div><div class="fc-col-h">Example in analytics</div><div class="fc-col-t">${c.example}</div></div>
      </div>
      <div class="fc-div"></div>
      <div style="margin-bottom:12px">
        <div class="fc-col-h" style="margin-bottom:6px">Label guide</div>
        <div class="lpills">${pills(c.labelKey)}</div>
        <div class="lpill-hint">Hover any label to see what it means</div>
      </div>
      <div class="fc-footer">
        <div class="fc-dots">${CARDS.map((_,ci)=>`<div class="fc-dot${ci===i?' on':''}"></div>`).join('')}</div>
        <span class="fc-prog">Card ${i+1} of 13 · advances daily</span>
        <div class="fc-badge">${c.abbr}</div>
      </div>
    </div>`;
  } else if(rank==='Q'){
    const mList=[
      {name:'Learner Readiness',key:'dci'},{name:'Thinking Depth',key:'bpi'},
      {name:'Self-Awareness',key:'ccg'},{name:'Decision Accuracy',key:'dqs'},
      {name:'Learner Positioning',key:'zone'},{name:'Start Behaviour',key:'pi'},
      {name:'Handling Uncertainty',key:'ums'},{name:'Performance Consistency',key:'citime'},

    ];
    const rows=mList.map(m=>`<div class="lgr-row"><div class="lgr-metric">${m.name}</div><div class="lpills">${pills(m.key)}</div></div>`).join('');
    content=`
    <div class="fc-corner tl ref"><span class="rnk">Q</span><span class="sut">♣</span></div>
    <div class="fc-corner br ref"><span class="rnk">Q</span><span class="sut">♣</span></div>
    <div class="fc-inner">
      <div class="fc-eyebrow ref">Reference card${isToday?' &nbsp;·&nbsp; TODAY':''}</div>
      <div class="fc-illus"><svg width="56" height="56" viewBox="0 0 56 56" fill="none"><rect x="4" y="8" width="48" height="6" rx="3" fill="#085041" opacity=".7"/><rect x="4" y="18" width="32" height="5" rx="2.5" fill="#1D9E75" opacity=".6"/><rect x="4" y="27" width="40" height="5" rx="2.5" fill="#EF9F27" opacity=".7"/><rect x="4" y="36" width="24" height="5" rx="2.5" fill="#D85A30" opacity=".6"/><rect x="4" y="45" width="44" height="5" rx="2.5" fill="#712B13" opacity=".5"/></svg></div>
      <div class="fc-name ref">${c.name}</div>
      <div style="font-size:11px;color:#8B6914;text-align:center;margin-bottom:12px">${c.subtitle}</div>
      <div class="fc-div"></div>
      <div style="columns:2;column-gap:20px;margin-bottom:14px">${rows}</div>
      <div class="fc-footer">
        <div class="fc-dots">${CARDS.map((_,ci)=>`<div class="fc-dot${ci===i?' on':''}"></div>`).join('')}</div>
        <span class="fc-prog">Card ${i+1} of 13 · advances daily</span>
        <div class="fc-badge ref">REF</div>
      </div>
    </div>`;
  } else {
    const steps=[
      {n:1,t:'<strong>Compare centres</strong> — every heatmap shows all centres as rows. Dark colour = strong label concentrated in that centre.'},
      {n:2,t:'<strong>Pick an assessment</strong> — columns are A1–A15. Click any cell to drill in. Use sliders on snapshot views.'},
      {n:3,t:'<strong>See distribution (Level 1)</strong> — a colour-only bar appears below the chart. Click a colour segment to see counts.'},
      {n:4,t:'<strong>See counts + change (Level 2)</strong> — count cards show learners per label and change from the previous assessment.'},
      {n:5,t:'<strong>Find learners (Level 3)</strong> — click any count card to see the named learner table for targeted follow-up.'},
      {n:6,t:'<strong>Filter by CEFR</strong> — use the CEFR selector at the top. All charts and drill-downs update instantly.'}
    ];
    content=`
    <div class="fc-corner tl ref"><span class="rnk">K</span><span class="sut">♠</span></div>
    <div class="fc-corner br ref"><span class="rnk">K</span><span class="sut">♠</span></div>
    <div class="fc-inner">
      <div class="fc-eyebrow ref">Reference card${isToday?' &nbsp;·&nbsp; TODAY':''}</div>
      <div class="fc-illus"><svg width="56" height="56" viewBox="0 0 56 56" fill="none"><rect x="6" y="6" width="44" height="44" rx="6" fill="none" stroke="#C9A84C" stroke-width="1.2" opacity=".4"/><line x1="6" y1="20" x2="50" y2="20" stroke="#C9A84C" stroke-width="0.8" opacity=".3"/><circle cx="18" cy="13" r="3" fill="#C9A84C" opacity=".5"/><circle cx="28" cy="13" r="3" fill="#C9A84C" opacity=".5"/><circle cx="38" cy="13" r="3" fill="#C9A84C" opacity=".5"/><rect x="12" y="26" width="12" height="8" rx="2" fill="#085041" opacity=".7"/><rect x="32" y="26" width="12" height="8" rx="2" fill="#1D9E75" opacity=".6"/><rect x="12" y="38" width="32" height="6" rx="2" fill="#EF9F27" opacity=".4"/></svg></div>
      <div class="fc-name ref">${c.name}</div>
      <div style="font-size:11px;color:#8B6914;text-align:center;margin-bottom:12px">${c.subtitle}</div>
      <div class="fc-div"></div>
      <div class="ns-steps">${steps.map(s=>`<div class="ns-step"><div class="ns-num">${s.n}</div><div class="ns-text">${s.t}</div></div>`).join('')}</div>
      <div class="fc-footer">
        <div class="fc-dots">${CARDS.map((_,ci)=>`<div class="fc-dot${ci===i?' on':''}"></div>`).join('')}</div>
        <span class="fc-prog">Card ${i+1} of 13 · advances daily</span>
        <div class="fc-badge ref">REF</div>
      </div>
    </div>`;
  }

  wrap.innerHTML=`<div class="face-card${isRef?' reference':''}">${content}</div>`;
}

window.addEventListener('load',buildFan);
window.addEventListener('resize',buildFan);
</script>
